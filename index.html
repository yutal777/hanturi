<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PICK - Official Store</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        body { font-family: 'Pretendard', sans-serif; }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState, memo } = React;

        const HomePage = memo(() => (
            <div className="bg-white">
                {/* 메인 히어로 섹션: 텍스트와 이미지 간섭 완전 분리 */}
                <section className="min-h-screen flex flex-col items-center justify-between pt-32 pb-0 bg-[#f5f5f7] overflow-hidden">
                    <div className="z-10 text-center px-6 w-full">
                        <div className="text-[10px] font-medium text-gray-400 uppercase tracking-[0.4em] mb-6">/home</div>
                        <h1 className="text-4xl md:text-7xl font-bold tracking-tight text-[#1d1d1f] mb-4">가장 나다운 선택.</h1>
                        <p className="text-[#86868b] text-base md:text-xl font-medium tracking-tight uppercase">A choice uniquely mine</p>
                    </div>

                    {/* 이미지 컨테이너: 높이를 고정하고 하단 정렬 */}
                    <div className="w-full h-[50vh] flex items-end justify-center z-0">
                        <img 
                            src="main_v2_00000.png" 
                            alt="Main Background" 
                            className="w-full md:w-[60%] h-auto max-h-full object-contain object-bottom"
                            onError={(e) => { e.target.style.display = 'none'; }}
                        />
                    </div>
                </section>
                
                {/* 나머지 섹션은 기존 유지 */}
            </div>
        ));

        function App() {
            return <HomePage />;
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
