<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PICK - Official Store</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Pretendard Font -->
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />
    <!-- React & Babel CDNs -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { font-family: 'Pretendard', sans-serif; background-color: black; color: white; }
        .selection\:bg-white ::selection { background-color: white; color: black; }
        /* Lucide 아이콘 스타일 강제 적용 */
        .lucide-icon svg { stroke: currentColor; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; display: block; }
    </style>
</head>
<body class="selection:bg-white">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useCallback } = React;
        
        // Lucide 아이콘 컴포넌트 (CDN 로드 지연 대응형)
        const Icon = ({ name, size = 24, className = "" }) => {
            const [svg, setSvg] = useState("");

            const renderIcon = useCallback(() => {
                if (window.lucide && window.lucide.icons[name]) {
                    const svgString = window.lucide.icons[name].toSvg({
                        width: size,
                        height: size,
                        class: className
                    });
                    setSvg(svgString);
                }
            }, [name, size, className]);

            useEffect(() => {
                renderIcon();
                // 라이브러리가 아직 로드되지 않았을 경우를 대비한 반복 체크
                if (!window.lucide || !window.lucide.icons[name]) {
                    const timer = setInterval(() => {
                        if (window.lucide && window.lucide.icons[name]) {
                            renderIcon();
                            clearInterval(timer);
                        }
                    }, 100);
                    return () => clearInterval(timer);
                }
            }, [renderIcon, name]);

            if (!svg) return <span style={{ width: size, height: size, display: 'inline-block' }}></span>;

            return (
                <span 
                    className="lucide-icon inline-flex items-center justify-center"
                    dangerouslySetInnerHTML={{ __html: svg }} 
                />
            );
        };

        // 인스타그램 전용 인라인 SVG (무조건 표시됨)
        const InstagramIcon = ({ size = 24 }) => (
            <svg 
                width={size} 
                height={size} 
                viewBox="0 0 24 24" 
                fill="none" 
                stroke="currentColor" 
                strokeWidth="2" 
                strokeLinecap="round" 
                strokeLinejoin="round"
            >
                <rect x="2" y="2" width="20" height="20" rx="5" ry="5"></rect>
                <path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"></path>
                <line x1="17.5" y1="6.5" x2="17.51" y2="6.5"></line>
            </svg>
        );

        function App() {
            const [page, setPage] = useState('home');
            const [selectedProduct, setSelectedProduct] = useState(null);
            const [isMenuOpen, setIsMenuOpen] = useState(false);

            useEffect(() => {
                window.scrollTo(0, 0);
            }, [page]);

            const navigateTo = (p, data = null) => {
                setPage(p);
                setSelectedProduct(data);
                setIsMenuOpen(false);
            };

            const Navbar = () => (
                <nav className="fixed top-0 left-0 w-full z-50 bg-black/80 backdrop-blur-md border-b border-white/10 px-6 py-4 flex justify-between items-center text-white">
                    <div className="text-2xl font-semibold tracking-tighter cursor-pointer" onClick={() => navigateTo('home')}>
                        PICK
                    </div>
                    <div className="hidden md:flex items-center gap-10 text-sm font-medium uppercase tracking-widest text-white">
                        <button onClick={() => navigateTo('home')} className={`hover:text-gray-400 transition ${page === 'home' ? 'text-white' : 'text-gray-500'}`}>Home</button>
                        <button onClick={() => navigateTo('products')} className={`hover:text-gray-400 transition ${page === 'products' ? 'text-white' : 'text-gray-500'}`}>Products</button>
                        <button onClick={() => navigateTo('products')} className="bg-white text-black px-6 py-2 text-xs font-semibold hover:bg-gray-200 transition tracking-widest ml-4 border-none outline-none">BUY</button>
                    </div>
                    <div className="md:hidden cursor-pointer text-white" onClick={() => setIsMenuOpen(!isMenuOpen)}>
                        <Icon name={isMenuOpen ? "x" : "menu"} />
                    </div>
                    {isMenuOpen && (
                        <div className="fixed inset-0 top-[65px] bg-black z-40 p-10 flex flex-col gap-8 text-4xl font-semibold md:hidden">
                            <button onClick={() => navigateTo('home')}>HOME</button>
                            <button onClick={() => navigateTo('products')}>PRODUCTS</button>
                            <button onClick={() => navigateTo('products')} className="bg-white text-black py-4 text-xl text-center">BUY NOW</button>
                        </div>
                    )}
                </nav>
            );

            const HomePage = () => (
                <div className="pt-24">
                    <section className="px-6 py-20 md:py-40 max-w-7xl mx-auto flex flex-col items-center text-center">
                        <h1 className="text-7xl md:text-[12rem] font-semibold tracking-tighter leading-none mb-10 opacity-90">PICK</h1>
                        <div className="max-w-2xl mt-10">
                            <p className="text-xl md:text-3xl font-light mb-4">Pick your variety,<br />stick your style.</p>
                            <p className="text-gray-500 text-sm md:text-lg mb-12">다양함을 Pick하고, 당신의 스타일을 붙이세요.</p>
                            <button onClick={() => navigateTo('products')} className="group flex items-center gap-3 mx-auto text-sm font-semibold uppercase tracking-widest border-b border-white pb-2 hover:text-gray-400 transition">
                                VIEW PRODUCTS <Icon name="arrow-right" size={16} />
                            </button>
                        </div>
                    </section>
                    <section className="px-6 py-32 border-t border-white/10 bg-[#0a0a0a]">
                        <div className="max-w-7xl mx-auto grid md:grid-cols-2 gap-20 text-left">
                            <div className="space-y-6">
                                <span className="text-xs font-semibold text-gray-500 uppercase tracking-widest">[ 01. Concept ]</span>
                                <h2 className="text-3xl md:text-4xl font-semibold">당신의 개성을 표현하는<br />가장 작은 조각, 스티커.</h2>
                                <p className="text-gray-400">평범한 일상에 새로운 생명력을 불어넣고 자신의 취향을 공유하는 문화를 만듭니다.</p>
                            </div>
                            <div className="space-y-6">
                                <span className="text-xs font-semibold text-gray-500 uppercase tracking-widest">[ 02. Quality ]</span>
                                <h2 className="text-3xl md:text-4xl font-semibold">타협하지 않는 디테일과<br />지속 가능한 소재의 조화.</h2>
                                <p className="text-gray-400">고해상도 프린팅과 강력한 내구성으로 소중한 물건을 안전하고 아름답게 꾸며줍니다.</p>
                            </div>
                        </div>
                    </section>
                </div>
            );

            const ProductsPage = () => {
                const cats = [
                    { id: 1, name: 'Minimalism', desc: '단순함의 미학을 담은 라인워크 시리즈' },
                    { id: 2, name: 'Typography', desc: '강렬한 메시지를 전달하는 폰트 컬렉션' },
                    { id: 3, name: 'Geometric', desc: '완벽한 비율과 형태의 기하학적 문양' },
                    { id: 4, name: 'Vintage', desc: '시간의 흔적을 담은 아날로그 감성' },
                    { id: 5, name: 'Illustration', desc: '작가의 독창적인 세계관이 담긴 아트웍' },
                    { id: 6, name: 'Special Edition', desc: '브랜드 콜라보레이션 및 한정판 스티커' }
                ];
                return (
                    <div className="pt-32 px-6 pb-20 max-w-7xl mx-auto">
                        <div className="mb-20 text-left">
                            <h2 className="text-xs font-semibold text-gray-500 uppercase tracking-[0.3em] mb-4">Categories</h2>
                            <h1 className="text-5xl md:text-7xl font-semibold tracking-tighter uppercase">OUR VARIETY</h1>
                        </div>
                        <div className="grid md:grid-cols-2 lg:grid-cols-3 gap-6">
                            {cats.map(cat => (
                                <div key={cat.id} onClick={() => navigateTo('detail', cat)} className="group relative border border-white/10 bg-[#0d0d0d] p-10 h-[400px] flex flex-col justify-between hover:bg-white hover:text-black transition-all duration-500 cursor-pointer">
                                    <span className="text-4xl font-semibold opacity-10 group-hover:opacity-100">0{cat.id}</span>
                                    <div className="text-left">
                                        <h3 className="text-3xl font-semibold mb-4 tracking-tighter uppercase">{cat.name}</h3>
                                        <p className="text-sm opacity-60 mb-8">{cat.desc}</p>
                                        <div className="flex items-center gap-2 text-xs font-semibold uppercase tracking-tighter pt-4 border-t border-current/20">
                                            Explore Collection <Icon name="chevron-right" size={14} />
                                        </div>
                                    </div>
                                </div>
                            ))}
                        </div>
                    </div>
                );
            };

            const DetailPage = ({ product }) => (
                <div className="pt-32 px-6 pb-40 max-w-7xl mx-auto text-left">
                    <button onClick={() => navigateTo('products')} className="flex items-center gap-2 text-gray-500 hover:text-white mb-12 text-sm uppercase tracking-widest font-semibold">
                        <Icon name="arrow-left" size={18} /> Back to Categories
                    </button>
                    <div className="grid lg:grid-cols-2 gap-16 mb-16">
                        <div className="aspect-square bg-[#111] border border-white/5 flex items-center justify-center relative overflow-hidden">
                            <div className="w-64 h-64 border-4 border-white/20 rotate-12 flex items-center justify-center p-8 text-center">
                                <span className="text-2xl font-semibold italic uppercase tracking-tighter">PICK STICKER<br/>{product?.name}</span>
                            </div>
                            <div className="absolute top-4 right-4 text-[10px] uppercase tracking-widest opacity-30">Authentic PICK Label</div>
                        </div>
                        <div className="flex flex-col justify-center">
                            <span className="text-xs font-semibold text-gray-500 uppercase tracking-widest mb-4">Edition 0{product?.id}</span>
                            <h1 className="text-5xl md:text-6xl font-semibold tracking-tighter mb-6 uppercase leading-none">{product?.name}</h1>
                            <p className="text-xl text-gray-400 mb-10 leading-relaxed">{product?.desc}.</p>
                            <div className="space-y-6 mb-12 uppercase text-sm">
                                <div className="flex justify-between py-4 border-b border-white/10"><span className="text-gray-500 font-medium">Size</span><span>Mixed</span></div>
                                <div className="flex justify-between py-4 border-b border-white/10"><span className="text-gray-500 font-medium">Material</span><span>Waterproof Matte Vinyl</span></div>
                                <div className="flex justify-between py-4 border-b border-white/10"><span className="text-gray-500 font-medium">Price</span><span className="text-2xl font-semibold">₩18,000</span></div>
                            </div>
                            <button className="w-full bg-white text-black py-5 font-semibold uppercase tracking-widest hover:bg-gray-200 transition">BUY</button>
                        </div>
                    </div>
                    <div className="mt-20">
                        <h2 className="text-xs font-semibold text-gray-500 uppercase tracking-widest mb-10 pb-4 border-b border-white/10">Detailed Views</h2>
                        <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                            {[1, 2, 3, 4, 5].map(n => (
                                <div key={n} className={`bg-[#0d0d0d] border border-white/5 flex items-center justify-center text-gray-700 text-xs uppercase ${n === 4 ? 'aspect-[4/5] md:col-span-2' : 'aspect-square'}`}>Detail Shot 0{n}</div>
                            ))}
                        </div>
                    </div>
                </div>
            );

            return (
                <div className="min-h-screen text-white">
                    <Navbar />
                    <main>
                        {page === 'home' && <HomePage />}
                        {page === 'products' && <ProductsPage />}
                        {page === 'detail' && <DetailPage product={selectedProduct} />}
                    </main>
                    <footer className="border-t border-white/10 pt-20 pb-10 px-6 text-center">
                        <div className="text-4xl font-semibold tracking-tighter mb-6 uppercase">PICK</div>
                        <p className="text-gray-500 text-sm mb-10">다양함을 Pick하고, 당신의 스타일을 붙이세요.</p>
                        <div className="flex justify-center mb-10">
                            <a 
                                href="https://www.instagram.com/pick_official2026/" 
                                target="_blank" 
                                rel="noopener noreferrer" 
                                className="text-gray-500 hover:text-white transition"
                                aria-label="Instagram"
                            >
                                <InstagramIcon size={32} />
                            </a>
                        </div>
                        <div className="mt-20 pt-8 border-t border-white/5 text-[10px] text-gray-600 uppercase tracking-widest">
                            © 2024 PICK BRAND. All Rights Reserved.
                        </div>
                    </footer>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
