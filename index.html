
<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PICK - Official Store</title>
    
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://picksticker.store">
    <meta property="og:title" content="PICK - Official Store">
    <meta property="og:description" content="가장 나다운 선택. A choice uniquely mine">
    
    <link rel="icon" href="/favicon.png" type="image/png">
    
    <!-- Vercel Insights 스크립트 추가 -->
    <script src="/_vercel/insights/script.js"></script>
    
    <!-- CSS & Libraries -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: white;
            color: #1d1d1f;
            -webkit-font-smoothing: antialiased;
        }

        body { 
            font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, Roboto, sans-serif; 
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .fade-in {
            animation: fadeIn 1.2s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .tracking-tight-custom {
            letter-spacing: -0.05em;
        }

        /* 3D 스크롤 섹션 스타일 (추후 복구용) */
        .scrolly-background-section { height: 400vh; position: relative; z-index: 1; display: none; }
        .sticky-canvas-area { position: sticky; top: 0; left: 0; height: 100vh; width: 100%; display: flex; align-items: center; justify-content: center; overflow: hidden; background-color: white; }
        .scrolly-video-canvas { width: 100vw; height: 100vh; object-fit: cover; display: block; will-change: contents; }
        .reveal { opacity: 0; transform: translateY(20px); transition: all 0.6s cubic-bezier(0.22, 1, 0.36, 1); will-change: transform, opacity; }
        .reveal.active { opacity: 1; transform: translateY(0); }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useCallback, useRef, memo } = React;

        // --- 임시 티저 페이지 컴포넌트 ---
        const ComingSoon = () => (
            <div className="flex flex-col items-center justify-center p-6 text-center fade-in">
                <div className="text-[12px] font-semibold tracking-[0.4em] text-gray-300 uppercase mb-8 select-none">
                    PICK BRAND
                </div>
                <h1 className="text-4xl md:text-6xl font-semibold tracking-tight-custom leading-tight text-[#1d1d1f]">
                    5월 12일, 공개.
                </h1>
                <p className="mt-6 text-[#86868b] text-base md:text-lg font-medium tracking-tight uppercase">
                    A choice uniquely mine
                </p>
            </div>
        );

        // --- 메인 App 컴포넌트 ---
        function App() {
            // 브랜드 공개 전까지 ComingSoon 컴포넌트만 렌더링하도록 설정
            return (
                <main className="min-h-screen w-full flex items-center justify-center bg-white">
                    <ComingSoon />
                </main>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);

        /* 기존 기능 컴포넌트(Navbar, HomePage, ProductsPage 등) 및 
           비디오 스크롤 최적화 로직은 삭제하지 않고 데이터 상에 보존합니다. 
           추후 "되돌리기" 요청 시 해당 로직들을 App 컴포넌트에 다시 연결할 수 있습니다.
        */
    </script>
</body>
</html>
