<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PICK - Official Store</title>
    
    <!-- SEO 및 소셜 미디어 설정 -->
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://picksticker.store">
    <meta property="og:title" content="PICK - Official Store">
    <meta property="og:description" content="나답게, 남다르게. Be myself, Be different.">
    
    <link rel="icon" href="/favicon.png" type="image/png">
    
    <!-- 필수 라이브러리 로드 -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        body { 
            font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, Roboto, sans-serif; 
            background-color: white; 
            color: #1d1d1f; 
            margin: 0; 
            overflow-x: hidden; 
            scroll-behavior: smooth;
            -webkit-font-smoothing: antialiased;
        }
        
        .font-semibold { font-weight: 600; }
        .font-medium { font-weight: 500; }
        .font-normal { font-weight: 400; }

        .reveal { opacity: 0; transform: translateY(20px); transition: all 0.8s cubic-bezier(0.22, 1, 0.36, 1); }
        .reveal.active { opacity: 1; transform: translateY(0); }

        /* Full Screen Hero Area */
        .hero-bg-container {
            height: 100vh;
            width: 100%;
            position: relative;
            background-color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow: hidden;
        }

        .hero-png-placeholder {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            background-color: #f5f5f7;
        }

        /* Scrollytelling 컨테이너 */
        .scrolly-background-section {
            height: 300vh;
            position: relative;
        }
        .sticky-canvas-area {
            position: sticky;
            top: 0;
            height: 100vh;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 0;
        }

        /* 팝업 애니메이션 */
        .popup-overlay {
            animation: appleFadeIn 0.5s cubic-bezier(0.16, 1, 0.3, 1);
        }
        @keyframes appleFadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* 스크롤바 숨기기 */
        ::-webkit-scrollbar { width: 0px; background: transparent; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useCallback, useRef } = React;

        // SVG 아이콘 컴포넌트 직접 정의
        const ArrowRight = ({ size = 16, className = "" }) => (
            <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                <line x1="5" y1="12" x2="19" y2="12"></line><polyline points="12 5 19 12 12 19"></polyline>
            </svg>
        );

        const MenuIcon = ({ size = 24 }) => (
            <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                <line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="18" x2="21" y2="18"></line>
            </svg>
        );

        const XIcon = ({ size = 24 }) => (
            <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                <line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line>
            </svg>
        );

        const InstagramIcon = ({ size = 24 }) => (
            <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                <rect x="2" y="2" width="20" height="20" rx="5" ry="5"></rect>
                <path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"></path>
                <line x1="17.5" y1="6.5" x2="17.51" y2="6.5"></line>
            </svg>
        );

        const CheckIcon = ({ size = 16, className = "" }) => (
            <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" className={className}>
                <polyline points="20 6 9 17 4 12"></polyline>
            </svg>
        );

        const CATEGORIES = [
            { id: 1, name: 'Edition 01', price: '₩2,000' },
            { id: 2, name: 'Edition 02', price: '₩2,000' },
            { id: 3, name: 'Edition 03', price: '₩2,000' },
            { id: 4, name: 'Edition 04', price: '₩2,000' },
            { id: 5, name: 'Edition 05', price: '₩2,000' },
            { id: 6, name: 'Edition 06', price: '₩2,000' }
        ];

        const BUNDLES = [
            { 
                title: '콤보 추천', 
                subtitle: '3 Pieces', 
                price: '₩6,000', 
                features: ['3장 골라담기', '장당 2,000원꼴', '가장 많이 팔리는 선택'],
                tag: 'Most Popular',
                highlight: true
            },
            { 
                title: '풀세트 소장', 
                subtitle: '5 Pieces', 
                price: '₩10,000', 
                features: ['전 에디션 5종 소장', '장당 2,000원', '만원 한 장의 깔끔한 결제'],
                tag: 'Best Value',
                highlight: false
            }
        ];

        const PathIndicator = ({ path }) => (
            <div className="text-[10px] font-medium text-gray-300 uppercase tracking-[0.4em] mb-6 select-none">
                {path}
            </div>
        );

        const Reveal = ({ children, className = "" }) => {
            const ref = useRef(null);
            useEffect(() => {
                const observer = new IntersectionObserver(
                    ([entry]) => { if (entry.isIntersecting) entry.target.classList.add('active'); },
                    { threshold: 0.1 }
                );
                if (ref.current) observer.observe(ref.current);
                return () => observer.disconnect();
            }, []);
            return <div ref={ref} className={`reveal ${className}`}>{children}</div>;
        };

        function App() {
            const [page, setPage] = useState('home');
            const [selectedProduct, setSelectedProduct] = useState(null);
            const [isPopupOpen, setIsPopupOpen] = useState(false);
            const [isMenuOpen, setIsMenuOpen] = useState(false);
            const [scrollProgress, setScrollProgress] = useState(0);

            const syncPageWithHash = useCallback(() => {
                const hash = window.location.hash;
                let newPage = 'home';
                let newProduct = null;

                if (hash === '#/products') {
                    newPage = 'products';
                } else if (hash.startsWith('#/products/detail/')) {
                    const idStr = hash.split('/').pop();
                    const id = parseInt(idStr);
                    newProduct = CATEGORIES.find(c => c.id === id);
                    newPage = newProduct ? 'detail' : 'home';
                }

                setPage(newPage);
                setSelectedProduct(newProduct);
                window.scrollTo(0, 0);
            }, []);

            useEffect(() => {
                syncPageWithHash();
                window.addEventListener('hashchange', syncPageWithHash);
                const handleScroll = () => {
                    const section = document.getElementById('scrolly-section');
                    if (section) {
                        const offsetTop = section.offsetTop;
                        const height = section.offsetHeight - window.innerHeight;
                        if (height > 0) {
                            setScrollProgress(Math.max(0, Math.min(1, (window.scrollY - offsetTop) / height)));
                        }
                    }
                };
                window.addEventListener('scroll', handleScroll);
                return () => {
                    window.removeEventListener('hashchange', syncPageWithHash);
                    window.removeEventListener('scroll', handleScroll);
                };
            }, [syncPageWithHash]);

            useEffect(() => {
                document.body.style.overflow = isMenuOpen ? 'hidden' : 'unset';
            }, [isMenuOpen]);

            const navigateTo = (target) => {
                window.location.hash = target;
                setIsMenuOpen(false);
            };

            const Navbar = () => (
                <>
                    <nav className="fixed top-0 left-0 w-full z-[80] bg-white/70 backdrop-blur-md border-b border-gray-100 px-6 md:px-24 py-5 flex justify-between items-center transition-all duration-300">
                        <div className="text-xl font-semibold tracking-tighter cursor-pointer select-none" onClick={() => navigateTo('#/home')}>PICK</div>
                        <div className="hidden md:flex items-center gap-12 text-sm font-medium">
                            <button onClick={() => navigateTo('#/home')} className={`transition-colors ${page === 'home' ? 'text-black' : 'text-gray-400 hover:text-black'}`}>Home</button>
                            <button onClick={() => navigateTo('#/products')} className={`transition-colors ${page === 'products' ? 'text-black' : 'text-gray-400 hover:text-black'}`}>Products</button>
                            <button onClick={() => setIsPopupOpen(true)} className="bg-black text-white px-6 py-2 rounded-full text-[11px] font-semibold tracking-wider hover:bg-gray-800 transition-all">BUY</button>
                        </div>
                        <div className="flex items-center md:hidden gap-4">
                            <button onClick={() => setIsMenuOpen(!isMenuOpen)} className="text-black p-1 transition-transform duration-300 relative z-[90]">
                                {isMenuOpen ? <XIcon size={24} /> : <MenuIcon size={24} />}
                            </button>
                        </div>
                    </nav>

                    {isMenuOpen && (
                        <div className="fixed inset-0 z-[70] pt-[80px] bg-white/95 backdrop-blur-3xl animate-in fade-in slide-in-from-top-2 duration-300">
                            <div className="p-8 flex flex-col h-full gap-10">
                                <div className="flex flex-col gap-10 text-4xl font-semibold tracking-tighter">
                                    <button onClick={() => navigateTo('#/home')} className={`text-left transition-all ${page === 'home' ? 'text-black' : 'text-gray-300'}`}>Home</button>
                                    <button onClick={() => navigateTo('#/products')} className={`text-left transition-all ${page === 'products' ? 'text-black' : 'text-gray-300'}`}>Products</button>
                                </div>
                                <div className="mt-auto pb-10">
                                    <button onClick={() => { setIsPopupOpen(true); setIsMenuOpen(false); }} className="w-full bg-black text-white py-5 rounded-2xl font-semibold text-lg shadow-xl">BUY NOW</button>
                                </div>
                            </div>
                        </div>
                    )}
                </>
            );

            const PurchasePopup = () => (
                <div className="fixed inset-0 z-[100] flex items-center justify-center p-6 bg-white/70 backdrop-blur-3xl animate-in fade-in" onClick={() => setIsPopupOpen(false)}>
                    <button className="absolute top-10 right-10 text-black hover:opacity-50 transition"><XIcon size={32} /></button>
                    <div className="max-w-3xl text-center px-10" onClick={(e) => e.stopPropagation()}>
                        <h2 className="text-2xl md:text-5xl font-semibold leading-tight tracking-tight mb-12 break-keep">
                            서울영상고등학교 영상동 2F 비전홀 <br className="hidden md:block" /> 전자상거래 PICK 부스에서 현장 구매해 주세요!
                        </h2>
                        <button className="bg-black text-white px-12 py-4 rounded-full text-sm font-medium hover:bg-gray-800 transition-all" onClick={() => setIsPopupOpen(false)}>닫기</button>
                    </div>
                </div>
            );

            const HomePage = () => (
                <div className="bg-white">
                    <section className="h-screen w-full relative flex flex-col items-center overflow-hidden">
                        <div className="absolute inset-0 bg-[#f5f5f7] z-0"></div>
                        <div className="z-10 text-center pt-48 px-6 md:px-24 max-w-7xl mx-auto">
                            <Reveal>
                                <PathIndicator path="/home" />
                                <h1 className="text-4xl md:text-7xl font-semibold tracking-tight leading-tight mb-4 text-[#1d1d1f]">나답게, 남다르게.</h1>
                            </Reveal>
                            <Reveal>
                                <p className="text-[#86868b] text-base md:text-xl font-medium tracking-tight">Be myself, Be different.</p>
                            </Reveal>
                        </div>
                    </section>
                    <section id="scrolly-section" className="h-[300vh] relative bg-white pt-20">
                        <div className="sticky top-0 h-screen w-full flex items-center justify-center overflow-hidden">
                            <div className="text-center w-full px-6 md:px-12">
                                <div className="mx-auto w-[280px] md:w-[500px] aspect-square bg-[#f5f5f7] rounded-[3.5rem] flex items-center justify-center shadow-sm transition-all duration-500"
                                     style={{ transform: `scale(${1 + scrollProgress * 0.05})`, opacity: 0.7 + scrollProgress * 0.3 }}>
                                    <span className="text-gray-200 font-semibold text-5xl md:text-8xl italic tracking-tighter uppercase select-none">3D interactive</span>
                                </div>
                                <div className="mt-12">
                                    <p className="text-[10px] font-semibold text-gray-300 uppercase tracking-[0.6em]">Scroll to interact</p>
                                </div>
                            </div>
                        </div>
                    </section>
                    <section className="py-64 text-center bg-[#f5f5f7] px-6 md:px-12">
                        <Reveal>
                            <h2 className="text-5xl md:text-7xl font-semibold tracking-tight mb-16">READY TO PICK?</h2>
                            <button onClick={() => navigateTo('#/products')} className="group inline-flex items-center gap-4 text-xl font-medium text-[#0066cc] hover:underline underline-offset-8 decoration-2">
                                전체 에디션 보기 <ArrowRight size={22} className="group-hover:translate-x-2 transition-transform" />
                            </button>
                        </Reveal>
                    </section>
                </div>
            );

            const ProductsPage = () => (
                <div className="bg-white min-h-screen pt-40 pb-40 px-6 md:px-24">
                    <div className="max-w-7xl mx-auto">
                        <Reveal><PathIndicator path="/products" /></Reveal>
                        <div className="mb-32 text-center mt-12">
                            <h1 className="text-5xl md:text-8xl font-semibold tracking-tight leading-tight">Our Variety</h1>
                            <p className="text-[#86868b] mt-8 text-lg font-medium">당신의 스타일을 완성할 6가지 독창적인 에디션</p>
                        </div>
                        <div className="grid md:grid-cols-2 lg:grid-cols-3 gap-10 mb-48">
                            {CATEGORIES.map((cat) => (
                                <Reveal key={cat.id}>
                                    <div onClick={() => navigateTo(`#/products/detail/0${cat.id}`)} className="group bg-[#f5f5f7] rounded-[2.5rem] p-8 md:p-12 aspect-square flex flex-col justify-between hover:bg-[#ebebed] transition-all duration-700 cursor-pointer border border-transparent overflow-hidden">
                                        <h3 className="text-3xl font-semibold tracking-tight leading-tight">{cat.name}</h3>
                                        <div className="flex-1 flex items-center justify-center group-hover:scale-105 transition-all duration-1000">
                                            <div className="w-32 h-32 md:w-44 md:h-44 bg-white border border-gray-100 rounded-[2.5rem] rotate-12 flex items-center justify-center shadow-sm">
                                                <span className="text-gray-100 font-semibold text-2xl md:text-3xl italic tracking-tighter">PICK</span>
                                            </div>
                                        </div>
                                        <div className="flex justify-between items-center pt-8 relative">
                                            <span className="text-xs md:text-sm font-medium text-[#86868b]">자세히 보기</span>
                                            <div className="w-10 h-10 md:w-11 md:h-11 rounded-full bg-black text-white flex items-center justify-center opacity-0 group-hover:opacity-100 group-hover:scale-110 transition-all mr-1 mb-1">
                                                <ArrowRight size={18} />
                                            </div>
                                        </div>
                                    </div>
                                </Reveal>
                            ))}
                        </div>
                        <div className="pt-24 border-t border-gray-100">
                            <div className="mb-24 text-center">
                                <h2 className="text-4xl md:text-6xl font-semibold tracking-tight leading-tight">Bundle & Save</h2>
                                <p className="text-[#86868b] mt-8 text-lg font-medium break-keep">많이 담을수록 더욱 가벼워지는 가격. 특별한 세트 구성을 확인하세요.</p>
                            </div>
                            <div className="grid md:grid-cols-2 gap-12 max-w-5xl mx-auto">
                                {BUNDLES.map((bundle, idx) => (
                                    <Reveal key={idx}>
                                        <div className={`relative h-full flex flex-col p-10 rounded-[3rem] border transition-all duration-500 ${bundle.highlight ? 'bg-[#fbfbfd] border-gray-200 shadow-xl scale-105 z-10' : 'bg-[#f5f5f7] border-transparent hover:bg-white hover:border-gray-100 hover:shadow-lg'}`}>
                                            {bundle.tag && <span className={`inline-block w-max px-3 py-1 rounded-full text-[10px] font-bold mb-6 ${bundle.highlight ? 'bg-black text-white' : 'bg-gray-200 text-gray-500'}`}>{bundle.tag}</span>}
                                            <h3 className="text-2xl font-semibold mb-2">{bundle.title}</h3>
                                            <p className="text-[#86868b] text-sm mb-6">{bundle.subtitle}</p>
                                            <div className="text-4xl font-semibold tracking-tight mb-10">{bundle.price}</div>
                                            <ul className="space-y-4 mb-12 flex-1">
                                                {bundle.features.map((f, i) => (
                                                    <li key={i} className="flex items-start gap-3 text-sm text-gray-500 font-medium leading-tight"><CheckIcon size={16} className="text-blue-600 mt-0.5 shrink-0" /> {f}</li>
                                                ))}
                                            </ul>
                                            <button onClick={() => setIsPopupOpen(true)} className={`w-full py-4 rounded-2xl text-sm font-semibold transition-all ${bundle.highlight ? 'bg-black text-white hover:bg-gray-800' : 'bg-white text-black border border-gray-100 hover:bg-gray-50'}`}>Select Plan</button>
                                        </div>
                                    </Reveal>
                                ))}
                            </div>
                        </div>
                    </div>
                </div>
            );

            const DetailPage = ({ product }) => (
                <div className="bg-white min-h-screen pt-40 pb-32 px-6 md:px-24">
                    <div className="max-w-7xl mx-auto">
                        <Reveal><PathIndicator path={`/products/detail/0${product?.id || '?'}`} /></Reveal>
                        <button onClick={() => navigateTo('#/products')} className="flex items-center gap-2 text-[#86868b] hover:text-black mb-20 text-xs font-semibold uppercase tracking-widest transition-colors mt-8">
                            <ArrowRight size={14} className="rotate-180" /> 목록으로 돌아가기
                        </button>
                        <div className="grid lg:grid-cols-2 gap-16 md:gap-32 mb-32 items-center">
                            <div className="aspect-square bg-[#f5f5f7] rounded-[3.5rem] flex items-center justify-center relative shadow-inner overflow-hidden">
                                <div className="w-64 h-64 md:w-72 md:h-72 border-[12px] border-white rotate-12 flex items-center justify-center p-10 text-center bg-white shadow-2xl rounded-[3rem]">
                                    <span className="text-2xl font-semibold italic uppercase tracking-tighter text-gray-100">PICK STICKER<br/>{product?.name}</span>
                                </div>
                            </div>
                            <div className="flex flex-col">
                                <h1 className="text-6xl md:text-8xl font-semibold tracking-tight mb-10 leading-tight">{product?.name}</h1>
                                <p className="text-xl md:text-2xl text-[#86868b] mb-16 leading-relaxed font-medium break-keep">정밀한 디테일과 압도적인 감각. {product?.name} 컬렉션은 당신의 공간을 특별하게 만듭니다.</p>
                                <div className="space-y-8 mb-20 border-t border-gray-100 pt-12 text-sm font-medium">
                                    <div className="flex justify-between items-start gap-8"><span className="text-[#86868b] uppercase tracking-widest text-[12px]">Place</span><span className="text-right break-keep text-base md:text-lg text-[#1d1d1f]">서울특별시 양천구 목동로11길 46 <br/>서울영상고 영상동 2층 비전홀</span></div>
                                    <div className="flex justify-between items-center"><span className="text-[#86868b] uppercase tracking-widest text-[12px]">Price</span><span className="text-3xl font-semibold tracking-tight text-[#1d1d1f]">{product?.price}</span></div>
                                </div>
                                <button onClick={() => setIsPopupOpen(true)} className="bg-black text-white py-6 rounded-full font-semibold text-sm hover:bg-gray-800 transition-all shadow-xl active:scale-[0.98]">BUY NOW</button>
                            </div>
                        </div>
                    </div>
                </div>
            );

            return (
                <div className="min-h-screen bg-white">
                    <Navbar />
                    <main>
                        {page === 'home' && <HomePage />}
                        {page === 'products' && <ProductsPage />}
                        {page === 'detail' && <DetailPage product={selectedProduct} />}
                    </main>
                    <footer className="bg-[#f5f5f7] pt-40 pb-20 px-6 md:px-24 text-center border-t border-gray-100">
                        <div className="text-5xl font-semibold tracking-tighter mb-10">PICK</div>
                        <p className="text-[#86868b] text-lg mb-16 font-medium">다양함을 Pick하고, 당신의 스타일을 붙이세요.</p>
                        <div className="flex justify-center mb-24">
                            <a href="https://www.instagram.com/pick_official2026/" target="_blank" rel="noopener noreferrer" className="w-16 h-16 rounded-full border border-gray-200 flex items-center justify-center text-[#86868b] hover:text-black hover:border-black transition-all bg-white shadow-sm">
                                <InstagramIcon size={24} />
                            </a>
                        </div>
                        <div className="pt-12 border-t border-gray-200/50 text-[11px] text-[#86868b] font-medium uppercase tracking-[0.5em]">© 2026 PICK BRAND. All Rights Reserved.</div>
                    </footer>
                    {isPopupOpen && <PurchasePopup />}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
