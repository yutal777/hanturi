<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PICK - Official Store</title>
    
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://picksticker.store">
    <meta property="og:title" content="PICK - Official Store">
    <meta property="og:description" content="가장 나다운 선택. A choice uniquely mine">
    
    <link rel="icon" href="/favicon.png" type="image/png">
    
    <script src="/_vercel/insights/script.js"></script>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            background-color: white;
            color: #1d1d1f;
            -webkit-font-smoothing: antialiased;
        }

        body { 
            font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, Roboto, sans-serif; 
            overflow-x: hidden;
        }
        
        .font-semibold { font-weight: 600; }
        .font-bold { font-weight: 700; }
        .font-medium { font-weight: 500; }
        .font-normal { font-weight: 400; }

        .reveal { 
            opacity: 0; 
            transform: translateY(20px); 
            transition: all 0.6s cubic-bezier(0.22, 1, 0.36, 1); 
            will-change: transform, opacity;
        }
        .reveal.active { opacity: 1; transform: translateY(0); }

        .popup-overlay {
            animation: appleFadeIn 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }
        @keyframes appleFadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        ::-webkit-scrollbar { width: 0px; background: transparent; }

        /* 티저 전용 페이드인 애니메이션 */
        .teaser-fade-in {
            animation: teaserFadeIn 1.2s cubic-bezier(0.16, 1, 0.3, 1);
        }
        @keyframes teaserFadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useCallback, useRef, memo } = React;

        // --- 기준 타겟 시간 상수 정의 (KST 기준 2026년 5월 20일 20시 정각) ---
        const TARGET_TIME = new Date('2026-05-20T20:00:00+09:00').getTime();

        // --- 공유 Observer (효율적인 스크롤 애니메이션) ---
        const globalObserver = typeof IntersectionObserver !== 'undefined' 
            ? new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) {
                        entry.target.classList.add('active');
                        globalObserver.unobserve(entry.target);
                    }
                });
            }, { threshold: 0.1 })
            : null;

        // --- SVG Icons ---
        const ArrowRight = memo(({ size = 16, className = "" }) => (
            <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                <line x1="5" y1="12" x2="19" y2="12"></line><polyline points="12 5 19 12 12 19"></polyline>
            </svg>
        ));

        const MenuIcon = memo(({ size = 24 }) => (
            <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                <line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="18" x2="21" y2="18"></line>
            </svg>
        ));

        const XIcon = memo(({ size = 24 }) => (
            <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                <line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line>
            </svg>
        ));

        const CheckIcon = memo(({ size = 16, className = "" }) => (
            <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" className={className}>
                <polyline points="20 6 9 17 4 12"></polyline>
            </svg>
        ));

        const InstagramIcon = memo(({ size = 24 }) => (
            <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                <rect x="2" y="2" width="20" height="20" rx="5" ry="5"></rect>
                <path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"></path>
                <line x1="17.5" y1="6.5" x2="17.51" y2="6.5"></line>
            </svg>
        ));

        // --- 상품 데이터 및 배경 인라인 스타일 그라디언트 맵 정의 (가격 정보 500원 인상 반영) ---
        const CATEGORIES = [
            { 
                id: 1, 
                name: '빈티지 에디션', 
                price: '₩2,500 ~ ₩4,500', 
                detailPrice: { phone: '₩2,500', computer: '₩4,500' }, 
                desc: '클래식하고 감성적인 레트로 무드의 빈티지 스티커',
                img: 'pick_Mock-up_Vintage.png',
                gradient: 'linear-gradient(to bottom, #E9E4DB, #C8BFA9)' // Warm Champagne Gold
            },
            { 
                id: 2, 
                name: '유틸리티 에디션', 
                price: '₩2,500 ~ ₩4,500', 
                detailPrice: { phone: '₩2,500', computer: '₩4,500' }, 
                desc: '테크니컬하고 실용적인 인더스트리얼 감성의 유틸리티 스티커',
                img: 'pick_Mock-up_Utility.png',
                gradient: 'linear-gradient(to bottom, #E3E4E5, #999DA0)' // Natural Titanium Gray
            },
            { 
                id: 3, 
                name: '스마일 에디션', 
                price: '₩2,500 ~ ₩4,500', 
                detailPrice: { phone: '₩2,500', computer: '₩4,500' }, 
                desc: '보기만 해도 미소가 지어지는 유쾌하고 귀여운 스마일 캐릭터 스티커',
                img: 'pick_Mock-up_smail.png',
                gradient: 'linear-gradient(to bottom, #FFF3C4, #F7C665)' // Radiant Sunny Yellow
            },
            { 
                id: 4, 
                name: '스트릿 에디션', 
                price: '₩2,500 ~ ₩4,500', 
                detailPrice: { phone: '₩2,500', computer: '₩4,000' }, 
                desc: '자유분방하고 트렌디한 스트릿 문화 감성의 스트릿 스티커',
                img: 'pick_Mock-up_street.png',
                gradient: 'linear-gradient(to bottom, #E8E6FC, #B0A6EB)' // Cool Urban Purple-Blue
            },
            { 
                id: 5, 
                name: 'Y2K 에디션', 
                price: '₩2,500 ~ ₩4,500', 
                detailPrice: { phone: '₩2,500', computer: '₩4,500' }, 
                desc: '세기말 세련된 감성과 미래주의를 담아낸 Y2K 스티커',
                img: 'pick_Mock-up_y2k.png',
                gradient: 'linear-gradient(to bottom, #E3F2FD, #FCE4EC)' // Iridescent Millennium Pastel
            }
        ];

        // --- 세트리스트 데이터 정의 (가격 정보 500원 인상 반영) ---
        const BUNDLES = [
            { 
                title: '핸드폰 스티커 (작은 사이즈)', 
                subtitle: 'Phone Sticker', 
                price: '₩2,500', 
                features: ['핸드폰, 스마트 키, 무선이어폰 케이스 등 소형 기기 최적화', '기기 후면에 부착 시 완벽한 핏을 구현하는 미니 사이즈', '우수한 고정력과 생활 방수 코팅 마감'], 
                tag: 'Small Size', 
                highlight: true 
            },
            { 
                title: '컴퓨터 스티커 (큰 사이즈)', 
                subtitle: 'Computer Sticker', 
                price: '₩4,500', 
                features: ['노트북, 데스크톱 본체, 아이패드 및 태블릿 후면용', '큼직한 존재감으로 확실한 개성을 나타내는 라지 사이즈', '자국 없이 깔끔하게 제거되는 이지 오프 특수 재질'], 
                tag: 'Large Size', 
                highlight: false 
            }
        ];

        const PURCHASE_LINK = "https://forms.gle/JJHGUTqh6HgKVvM36";

        // --- 공통 구성 요소 ---
        const PathIndicator = memo(({ path }) => (
            <div className="text-[10px] font-medium text-gray-400 uppercase tracking-[0.4em] mb-6 select-none">
                {path}
            </div>
        ));

        const Reveal = memo(({ children, className = "" }) => {
            const ref = useRef(null);
            useEffect(() => {
                if (ref.current && globalObserver) globalObserver.observe(ref.current);
                return () => { if (ref.current && globalObserver) globalObserver.unobserve(ref.current); };
            }, []);
            return <div ref={ref} className={`reveal ${className}`}>{children}</div>;
        });

        // --- 티저 페이지 컴포넌트 (실시간 카운트다운 탑재) ---
        const ComingSoonPage = memo(({ onBypass }) => {
            const [timeLeft, setTimeLeft] = useState({ hours: 0, minutes: 0, seconds: 0, expired: false });

            useEffect(() => {
                const updateCountdown = () => {
                    const now = new Date().getTime();
                    const difference = TARGET_TIME - now;

                    if (difference <= 0) {
                        setTimeLeft({ hours: 0, minutes: 0, seconds: 0, expired: true });
                        onBypass();
                        return;
                    }

                    const hours = Math.floor(difference / (1000 * 60 * 60));
                    const minutes = Math.floor((difference % (1000 * 60 * 60)) / (1000 * 60));
                    const seconds = Math.floor((difference % (1000 * 60)) / 1000);

                    setTimeLeft({ hours, minutes, seconds, expired: false });
                };

                updateCountdown();
                const timer = setInterval(updateCountdown, 1000);
                return () => clearInterval(timer);
            }, [onBypass]);

            return (
                <div className="min-h-screen w-full flex flex-col items-center justify-center p-6 text-center teaser-fade-in bg-white">
                    <div className="text-[12px] font-semibold tracking-[0.4em] text-gray-300 uppercase mb-8 select-none">
                        PICK BRAND
                    </div>
                    <h1 className="text-4xl md:text-6xl font-semibold tracking-tight leading-tight text-[#1d1d1f] select-none mb-6" style={{ letterSpacing: '-0.05em' }}>
                        5월 20일 20:00, 공개.
                    </h1>

                    {!timeLeft.expired && (
                        <div className="flex gap-4 md:gap-6 text-3xl md:text-5xl font-bold text-black mb-10 select-none">
                            <div className="flex flex-col items-center min-w-[60px] md:min-w-[80px]">
                                <span>{String(timeLeft.hours).padStart(2, '0')}</span>
                                <span className="text-[9px] md:text-[10px] text-gray-400 uppercase tracking-widest mt-2">Hours</span>
                            </div>
                            <span>:</span>
                            <div className="flex flex-col items-center min-w-[60px] md:min-w-[80px]">
                                <span>{String(timeLeft.minutes).padStart(2, '0')}</span>
                                <span className="text-[9px] md:text-[10px] text-gray-400 uppercase tracking-widest mt-2">Minutes</span>
                            </div>
                            <span>:</span>
                            <div className="flex flex-col items-center min-w-[60px] md:min-w-[80px]">
                                <span>{String(timeLeft.seconds).padStart(2, '0')}</span>
                                <span className="text-[9px] md:text-[10px] text-gray-400 uppercase tracking-widest mt-2">Seconds</span>
                            </div>
                        </div>
                    )}

                    <p className="mt-6 text-[#86868b] text-base md:text-lg font-medium tracking-tight uppercase select-none">
                        A choice uniquely <span onClick={onBypass} className="cursor-default hover:text-black transition-colors duration-300 select-all">mine</span>
                    </p>
                </div>
            );
        });

        const Navbar = memo(({ page, navigateTo, isMenuOpen, setIsMenuOpen }) => (
            <nav className="fixed top-0 left-0 w-full z-[80] bg-white/70 backdrop-blur-md border-b border-gray-100 px-6 md:px-24 py-5 flex justify-between items-center">
                <div className="text-xl font-semibold tracking-tighter cursor-pointer select-none" onClick={() => navigateTo('#/home')}>PICK</div>
                <div className="hidden md:flex items-center gap-12 text-sm font-medium">
                    <button onClick={() => navigateTo('#/home')} className={`transition-colors ${page === 'home' ? 'text-black' : 'text-gray-400 hover:text-black'}`}>Home</button>
                    <button onClick={() => navigateTo('#/products')} className={`transition-colors ${page === 'products' ? 'text-black' : 'text-gray-400 hover:text-black'}`}>Products</button>
                    <a href={PURCHASE_LINK} target="_blank" rel="noopener noreferrer" className="bg-black text-white px-6 py-2 rounded-full text-[11px] font-semibold tracking-wider hover:bg-gray-800 transition-all">BUY</a>
                </div>
                <div className="md:hidden">
                    <button onClick={() => setIsMenuOpen(!isMenuOpen)} className="text-black p-1 relative z-[90]">
                        {isMenuOpen ? <XIcon size={24} /> : <MenuIcon size={24} />}
                    </button>
                </div>
                {isMenuOpen && (
                    <div className="fixed inset-0 z-[70] pt-[80px] bg-white/95 backdrop-blur-3xl p-8 flex flex-col h-screen">
                        <div className="flex flex-col gap-10 text-4xl font-semibold tracking-tighter">
                            <button onClick={() => navigateTo('#/home')} className={page === 'home' ? 'text-black' : 'text-gray-300'}>Home</button>
                            <button onClick={() => navigateTo('#/products')} className={page === 'products' ? 'text-black' : 'text-gray-300'}>Products</button>
                        </div>
                        <a href={PURCHASE_LINK} target="_blank" rel="noopener noreferrer" className="mt-auto w-full bg-black text-white py-5 rounded-2xl font-semibold text-lg shadow-xl active:scale-[0.98] text-center block">BUY NOW</a>
                    </div>
                )}
            </nav>
        ));

        // --- HomePage 컴포넌트 ---
        const HomePage = memo(({ canvasRef, videoRef, overlayRef, navigateTo }) => (
            <div className="bg-white">
                <section className="h-screen w-full relative flex flex-col items-center justify-start overflow-hidden bg-[#f5f5f7]">
                    <div className="z-20 text-center pt-48 px-6 md:px-24 max-w-7xl mx-auto">
                        <Reveal>
                            <PathIndicator path="/home" />
                            <h1 className="text-4xl md:text-7xl font-bold tracking-tight leading-tight mb-4 text-[#1d1d1f]">가장 나다운 선택.</h1>
                        </Reveal>
                        <Reveal>
                            <p className="text-[#86868b] text-base md:text-xl font-medium tracking-tight uppercase">A choice uniquely mine</p>
                        </Reveal>
                    </div>

                    <div className="absolute inset-0 bg-gradient-to-b from-[#f5f5f7] via-[#f5f5f7]/85 to-transparent h-[55%] z-10 pointer-events-none"></div>

                    <div className="absolute bottom-[-48px] md:bottom-[-96px] left-0 w-full h-[64%] md:h-[73%] flex items-end justify-center overflow-hidden z-0">
                        <img 
                            src="main_v2_00000.png" 
                            alt="Main Background" 
                            className="w-[124%] md:w-[80%] h-full object-contain object-bottom"
                            onError={(e) => { e.target.style.display = 'none'; }}
                        />
                    </div>
                </section>

                {/* 01 Concept & 02 Quality 세션 */}
                <section className="px-6 md:px-24 py-64 max-w-7xl mx-auto space-y-64 bg-white relative z-10">
                    <div className="grid md:grid-cols-2 gap-16 md:gap-32 items-center">
                        <Reveal>
                            <div className="space-y-8 text-[#1d1d1f]">
                                <span className="text-xs font-semibold text-blue-600 uppercase tracking-[0.2em]">01 Concept</span>
                                <h2 className="text-4xl md:text-6xl font-semibold tracking-tight leading-[1.1]">가장 작은,<br/>확실한 개성.</h2>
                                <p className="text-[#86868b] text-lg leading-relaxed font-medium">우리는 일상의 소품에 새로운 생명력을 불어넣습니다. 당신의 취향을 가장 가볍고 세련되게 공유하는 방법.</p>
                            </div>
                        </Reveal>
                        <div className="aspect-[4/5] flex items-center justify-center overflow-visible">
                            <img 
                                src="Happy_iphone_Web.png"

                                className="w-full h-full object-contain" 
                                onError={(e) => { e.target.style.display = 'none'; }}

                        </div>
                    </div>
                    <div className="grid md:grid-cols-2 gap-16 md:gap-32 items-center">
                        <div className="aspect-[4/5] order-2 md:order-1 flex items-center justify-center overflow-visible">
                            <img 
                                src="Vintage_mac_Web.png" 
                                alt="Quality Sticker" 
                                className="w-full h-full object-contain" 
                                style={{ transform: 'scale(1.3) translateX(12%)' }}
                                onError={(e) => { e.target.style.display = 'none'; }}
                            />
                        </div>
                        <Reveal className="order-1 md:order-2">
                            <div className="space-y-8 text-[#1d1d1f]">
                                <span className="text-xs font-semibold text-[#34c759] uppercase tracking-[0.2em]">02 Quality</span>
                                <h2 className="text-4xl md:text-6xl font-semibold tracking-tight leading-[1.1]">타협 없는<br/>피니시.</h2>
                                <p className="text-[#86868b] text-lg leading-relaxed font-medium">흔적이 남지 않는 프리미엄 소재와 고해상도 프린팅. 당신의 소중한 기기를 안전하고 아름답게 보호하며 꾸며줍니다.</p>
                            </div>
                        </Reveal>
                    </div>
                </section>

                {/* 03 Harmony 전용 독립 세션 */}
                <section className="bg-[#f5f5f7] pt-24 pb-0 md:py-0 md:h-[650px] relative overflow-hidden z-10 border-t border-b border-gray-100">
                    <div className="max-w-7xl mx-auto h-full grid md:grid-cols-12 gap-8 items-center px-6 md:px-24 relative">
                        <Reveal className="md:col-span-4 md:py-24 z-20 max-w-sm">
                            <div className="space-y-8 text-[#1d1d1f]">
                                <h2 className="text-4xl md:text-6xl font-bold tracking-tight leading-[1.1]">어디서나,<br/>자연스럽게.</h2>
                                <p className="text-[#86868b] text-base md:text-lg leading-relaxed font-medium break-keep">
                                    노트북, 태블릿, 스마트폰 등 손길이 닿는 어떤 소품이나 공간에 매치해도 고유의 세련된 무드를 연출합니다. 대상의 한계를 넘어 경계 없이 녹아드는 감각적인 조화를 느껴보세요.

                            className="z-20 text-center px-6 transition-all duration-500 ease-out transform"

                            >
                                전체 에디션 보기 <ArrowRight size={22} className="group-hover:translate-x-2 transition-transform" />
                            </button>
                        </div>
                    </div>
                </section>
            </div>

        // --- Main App ---
        function App() {
            const [isTeaser, setIsTeaser] = useState(() => {

            });
            const [page, setPage] = useState('home');
            const [selectedProduct, setSelectedProduct] = useState(null);
            const [isMenuOpen, setIsMenuOpen] = useState(false);

            const videoRef = useRef(null);
            const canvasRef = useRef(null);
            const overlayRef = useRef(null);
            
            const targetTimeRef = useRef(0);
            const lerpedTimeRef = useRef(0); // 프레임 속도 추적용 참조값
            const lastRenderedTimeRef = useRef(-1);
            const rafIdRef = useRef(null);
            const isVideoSectionVisible = useRef(false);
            const drawRectRef = useRef({ sx: 0, sy: 0, sWidth: 0, sHeight: 0 });
            const sectionMetrics = useRef({ offsetTop: 0, scrollHeight: 0 });

            const lastVideoWidth = useRef(0);
            const lastVideoHeight = useRef(0);

            const syncPageWithHash = useCallback(() => {
                const hash = window.location.hash;
                let newPage = 'home';
                let newProduct = null;

                if (hash === '#/products') {
                    newPage = 'products';
                } else if (hash.startsWith('#/products/detail/')) {
                    const idStr = hash.split('/').pop();
                    const id = parseInt(idStr);
                    newProduct = CATEGORIES.find(c => c.id === id);
                    newPage = newProduct ? 'detail' : 'home';
                }

                setPage(newPage);
                setSelectedProduct(newProduct);
                window.scrollTo(0, 0);
            }, []);

            useEffect(() => {
                if (isTeaser) return;

                syncPageWithHash();
                window.addEventListener('hashchange', syncPageWithHash);

                const handleScroll = () => {
                    const section = document.getElementById('ready-scrolly-section');
                    const video = videoRef.current;
                    const overlay = overlayRef.current;
                    if (!section) return;

                    const offsetTop = section.offsetTop;
                    const scrollHeight = section.offsetHeight - window.innerHeight;
                    if (scrollHeight <= 0) return;

                    const scrollY = window.pageYOffset || document.documentElement.scrollTop;
                    const progress = Math.max(0, Math.min(1, (scrollY - offsetTop) / scrollHeight));
                    
                    if (video && video.duration) {
                        targetTimeRef.current = progress * video.duration;
                    }

                    if (overlay) {
                        if (progress > 0.75) {
                            const alpha = (progress - 0.75) * 4;
                            const translateY = (1 - alpha) * 20;
                            overlay.style.opacity = alpha;
                            overlay.style.transform = `translateY(${translateY}px)`;
                            overlay.style.pointerEvents = 'auto';
                        } else {
                            overlay.style.opacity = 0;
                            overlay.style.transform = `translateY(20px)`;
                            overlay.style.pointerEvents = 'none';
                        }
                    }
                };

                const performDraw = () => {
                    const video = videoRef.current;
                    const canvas = canvasRef.current;
                    if (!video || !canvas || video.readyState < 2) return;

                    const ctx = canvas.getContext('2d', { alpha: true });
                    
                    const timeToSeek = lerpedTimeRef.current;
                    const diff = Math.abs(video.currentTime - timeToSeek);

                    // 극미세 하드웨어 디코딩 병목 제어 데드존 (0.008초 미만의 소수점 변화 무시)
                    if (!video.seeking && diff > 0.008) {
                        video.currentTime = timeToSeek;
                    }
                    
                    const vWidth = video.videoWidth || 1920;
                    const vHeight = video.videoHeight || 1080;
                    
                    if (vWidth !== lastVideoWidth.current || vHeight !== lastVideoHeight.current) {
                        lastVideoWidth.current = vWidth;
                        lastVideoHeight.current = vHeight;
                        
                        const cWidth = canvas.width;
                        const cHeight = canvas.height;
                        const vRatio = vWidth / vHeight;
                        const cRatio = cWidth / cHeight;
                        if (vRatio > cRatio) {
                            drawRectRef.current = { sHeight: vHeight, sWidth: vHeight * cRatio, sx: (vWidth - (vHeight * cRatio)) / 2, sy: 0 };
                        } else {
                            drawRectRef.current = { sWidth: vWidth, sHeight: vWidth / cRatio, sx: 0, sy: (vHeight - (vWidth / cRatio)) / 2 };
                        }
                    }

                    // 투명 알파 채널 왜곡 복구를 위해 드로잉 전 캔버스를 기존 테마 색상(#f5f5f7)으로 채움
                    ctx.fillStyle = '#f5f5f7';
                    ctx.fillRect(0, 0, canvas.width, canvas.height);

                    ctx.imageSmoothingEnabled = true;
                    ctx.imageSmoothingQuality = 'high';
                    
                    const { sx, sy, sWidth, sHeight } = drawRectRef.current;
                    
                    if (sWidth > 0 && sHeight > 0) {
                        ctx.drawImage(video, sx, sy, sWidth, sHeight, 0, 0, canvas.width, canvas.height);
                    } else {
                        ctx.drawImage(video, 0, 0, vWidth, vHeight, 0, 0, canvas.width, canvas.height);
                    }
                };

                const renderLoop = () => {
                    if (isVideoSectionVisible.current) {
                        const target = targetTimeRef.current;
                        // 60fps 추적 속도 계수 감쇄율 2배 가속 상향 조정 (0.12 -> 0.24)
                        lerpedTimeRef.current += (target - lerpedTimeRef.current) * 0.24;
                        performDraw();
                    }
                    rafIdRef.current = requestAnimationFrame(renderLoop);
                };

                let rvfcId;
                if (videoRef.current && 'requestVideoFrameCallback' in HTMLVideoElement.prototype) {
                    const videoCallback = () => {
                        if (isVideoSectionVisible.current) performDraw();
                        rvfcId = videoRef.current.requestVideoFrameCallback(videoCallback);
                    };
                    rvfcId = videoRef.current.requestVideoFrameCallback(videoCallback);
                }

                window.addEventListener('scroll', handleScroll, { passive: true });
                rafIdRef.current = requestAnimationFrame(renderLoop);

                return () => {
                    window.removeEventListener('hashchange', syncPageWithHash);
                    window.removeEventListener('scroll', handleScroll);
                    if (rafIdRef.current) cancelAnimationFrame(rafIdRef.current);
                    if (rvfcId && videoRef.current) videoRef.current.cancelVideoFrameCallback(rvfcId);
                };
            }, [syncPageWithHash, page, isTeaser]);

            useEffect(() => {
                if (isTeaser) return;

                const section = document.getElementById('ready-scrolly-section');
                const video = videoRef.current;
                const canvas = canvasRef.current;
                
                let lastWidth = window.innerWidth;
                let lastHeight = window.innerHeight;

                const updateMetrics = () => {
                    if (!section || !video || !canvas) return;
                    
                    const currentWidth = window.innerWidth;
                    const currentHeight = window.innerHeight;
                    
                    const widthChanged = currentWidth !== lastWidth;
                    const heightChanged = Math.abs(currentHeight - lastHeight) > 120;

                    sectionMetrics.current = {
                        offsetTop: section.offsetTop,
                        scrollHeight: section.offsetHeight - window.innerHeight
                    };

                    const dpr = Math.min(window.devicePixelRatio || 1, 3);
                    
                    if (widthChanged || heightChanged || canvas.width === 0) {
                        canvas.width = currentWidth * dpr;
                        canvas.height = currentHeight * dpr;
                        
                        canvas.style.width = currentWidth + 'px';
                        canvas.style.height = currentHeight + 'px';
                        
                        lastWidth = currentWidth;
                        lastHeight = currentHeight;
                    }

                    const vWidth = video.videoWidth || 1920;
                    const vHeight = video.videoHeight || 1080;
                    
                    lastVideoWidth.current = vWidth;
                    lastVideoHeight.current = vHeight;

                    const cWidth = canvas.width;
                    const cHeight = canvas.height;
                    const vRatio = vWidth / vHeight;
                    const cRatio = cWidth / cHeight;
                    if (vRatio > cRatio) {
                        drawRectRef.current = { sHeight: vHeight, sWidth: vHeight * cRatio, sx: (vWidth - (vHeight * cRatio)) / 2, sy: 0 };
                    } else {
                        drawRectRef.current = { sWidth: vWidth, sHeight: vWidth / cRatio, sx: 0, sy: (vHeight - (vWidth / cRatio)) / 2 };
                    }
                    lastRenderedTimeRef.current = -1;
                };

                const sectionObserver = new IntersectionObserver(([entry]) => {
                    isVideoSectionVisible.current = entry.isIntersecting;
                    if (entry.isIntersecting) {
                        updateMetrics();
                        if (video && video.readyState < 2) video.load();
                    }
                }, { threshold: 0 });

                if (section) sectionObserver.observe(section);
                if (video) video.addEventListener('loadedmetadata', updateMetrics);
                window.addEventListener('resize', updateMetrics);
                updateMetrics();

                return () => {
                    if (section) sectionObserver.disconnect();
                    video?.removeEventListener('loadedmetadata', updateMetrics);
                    window.removeEventListener('resize', updateMetrics);
                };
            }, [page, isTeaser]);

            useEffect(() => {
                document.body.style.overflow = isMenuOpen ? 'hidden' : 'unset';
            }, [isMenuOpen]);

            const navigateTo = useCallback((target) => {
                window.location.hash = target;
                setIsMenuOpen(false);
            }, []);

            const handleTeaserBypass = useCallback(() => {
                setIsTeaser(false);
            }, []);

            if (isTeaser) {
                return <ComingSoonPage onBypass={handleTeaserBypass} />;
            }

            return (
                <div className="min-h-screen bg-white">
                    <Navbar page={page} navigateTo={navigateTo} isMenuOpen={isMenuOpen} setIsMenuOpen={setIsMenuOpen} />
                    <main>
                        {page === 'home' && (
                            <HomePage 
                                canvasRef={canvasRef} 
                                videoRef={videoRef} 
                                overlayRef={overlayRef} 
                                navigateTo={navigateTo} 
                            />
                        )}
                        {page === 'products' && <ProductsPage navigateTo={navigateTo} />}
                        {page === 'detail' && <DetailPage product={selectedProduct} navigateTo={navigateTo} />}
                    </main>
                    <footer className="bg-[#f5f5f7] pt-40 pb-20 px-6 md:px-24 text-center border-t border-gray-100 text-[#1d1d1f]">
                        <div className="text-5xl font-semibold tracking-tighter mb-10">PICK</div>
                        <p className="text-[#86868b] text-lg mb-16 font-medium">가장 나다운 선택. A choice uniquely mine</p>
                        <div className="flex justify-center mb-24">
                            <a href="https://www.instagram.com/pick_official_2026/" target="_blank" rel="noopener noreferrer" className="w-16 h-16 rounded-full border border-gray-200 flex items-center justify-center text-[#86868b] hover:text-black hover:border-black transition-all bg-white shadow-sm">
                                <InstagramIcon size={24} />
                            </a>
                        </div>
                        <div className="pt-12 border-t border-gray-200/50 text-[11px] text-[#86868b] font-medium uppercase tracking-[0.5em]">© 2026 PICK BRAND. All Rights Reserved.</div>
                    </footer>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
