
<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PICK - Official Store</title>
    
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://picksticker.store">
    <meta property="og:title" content="PICK - Official Store">
    <meta property="og:description" content="가장 나다운 선택. A choice uniquely mine">
    
    <link rel="icon" href="/favicon.png" type="image/png">
    
    <!-- CSS & Libraries -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: white;
            color: #1d1d1f;
            -webkit-font-smoothing: antialiased;
        }

        body { 
            font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, Roboto, sans-serif; 
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .fade-in {
            animation: fadeIn 1.2s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .tracking-tight-custom {
            letter-spacing: -0.05em;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { memo } = React;

        // --- 임시 티저 페이지 컴포넌트 ---
        const ComingSoon = () => (
            <div className="flex flex-col items-center justify-center p-6 text-center fade-in">
                <div className="text-[12px] font-semibold tracking-[0.4em] text-gray-300 uppercase mb-8 select-none">
                    PICK BRAND
                </div>
                <h1 className="text-4xl md:text-6xl font-semibold tracking-tight-custom leading-tight text-[#1d1d1f]">
                    5월 12일, 공개.
                </h1>
                <p className="mt-6 text-[#86868b] text-base md:text-lg font-medium tracking-tight">
                    A choice uniquely mine
                </p>
            </div>
        );

        /* 기존 페이지 구성 요소(Navbar, HomePage, ProductsPage, DetailPage 등)는 
           브랜드 공개 시 복구를 위해 하단에 정의되어 있으나, 
           현재 App 컴포넌트에서는 렌더링되지 않도록 설정되었습니다.
        */

        function App() {
            // 모든 라우팅 및 상태를 무시하고 티저 페이지만 렌더링
            return (
                <main className="min-h-screen w-full flex items-center justify-center bg-white">
                    <ComingSoon />
                </main>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);

        // --- 기존 컴포넌트 보존 (공개 시 전환용) ---
        /*
        const Navbar = memo(...);
        const HomePage = memo(...);
        const ProductsPage = memo(...);
        const DetailPage = memo(...);
        const PurchasePopup = memo(...);
        ... (이전 기능 코드들)
        */
    </script>
</body>
</html>

```
