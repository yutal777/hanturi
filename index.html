<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PICK - Official Store</title>
    
    <!-- SEO 및 소셜 미디어 엠베드 설정 -->
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://picksticker.store">
    <meta property="og:title" content="PICK - Official Store">
    <meta property="og:description" content="다양함을 Pick하고, 당신의 스타일을 붙이세요.">
    <meta property="og:image" content="/imagepick.png">
    
    <!-- Twitter Card 설정 -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="PICK - Official Store">
    <meta name="twitter:description" content="다양함을 Pick하고, 당신의 스타일을 붙이세요.">
    <meta name="twitter:image" content="/imagepick.png">

    <!-- 파비콘 설정 -->
    <link rel="icon" href="/favicon.png" type="image/png">
    
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Pretendard Font -->
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />
    <!-- React & Babel CDNs -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { font-family: 'Pretendard', sans-serif; background-color: black; color: white; margin: 0; overflow-x: hidden; }
        .selection\:bg-white ::selection { background-color: white; color: black; }
        
        /* Lucide 아이콘 스타일 강제 적용 */
        .lucide-icon svg { stroke: currentColor; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; display: block; }

        /* 등장 애니메이션 (Reveal 컴포넌트용) */
        .reveal {
            opacity: 0;
            transform: translateY(40px);
            transition: all 1.2s cubic-bezier(0.22, 1, 0.36, 1);
        }
        .reveal.active {
            opacity: 1;
            transform: translateY(0);
        }
    </style>
</head>
<body class="selection:bg-white">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useCallback, useRef } = React;
        
        // Lucide 아이콘 컴포넌트
        const Icon = ({ name, size = 24, className = "" }) => {
            const [svg, setSvg] = useState("");

            const renderIcon = useCallback(() => {
                if (window.lucide && window.lucide.icons[name]) {
                    const svgString = window.lucide.icons[name].toSvg({
                        width: size,
                        height: size,
                        class: className
                    });
                    setSvg(svgString);
                }
            }, [name, size, className]);

            useEffect(() => {
                renderIcon();
                if (!window.lucide || !window.lucide.icons[name]) {
                    const timer = setInterval(() => {
                        if (window.lucide && window.lucide.icons[name]) {
                            renderIcon();
                            clearInterval(timer);
                        }
                    }, 100);
                    return () => clearInterval(timer);
                }
            }, [renderIcon, name]);

            if (!svg) return <span style={{ width: size, height: size, display: 'inline-block' }}></span>;

            return (
                <span 
                    className="lucide-icon inline-flex items-center justify-center"
                    dangerouslySetInnerHTML={{ __html: svg }} 
                />
            );
        };

        // 화살표 전용 인라인 SVG
        const ArrowRightIcon = ({ size = 16, className = "" }) => (
            <svg 
                width={size} 
                height={size} 
                viewBox="0 0 24 24" 
                fill="none" 
                stroke="currentColor" 
                strokeWidth="2.5" 
                strokeLinecap="round" 
                strokeLinejoin="round"
                className={className}
            >
                <line x1="5" y1="12" x2="19" y2="12"></line>
                <polyline points="12 5 19 12 12 19"></polyline>
            </svg>
        );

        // 인스타그램 전용 인라인 SVG
        const InstagramIcon = ({ size = 24 }) => (
            <svg 
                width={size} 
                height={size} 
                viewBox="0 0 24 24" 
                fill="none" 
                stroke="currentColor" 
                strokeWidth="2" 
                strokeLinecap="round" 
                strokeLinejoin="round"
            >
                <rect x="2" y="2" width="20" height="20" rx="5" ry="5"></rect>
                <path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"></path>
                <line x1="17.5" y1="6.5" x2="17.51" y2="6.5"></line>
            </svg>
        );

        // 스크롤 감지 래퍼 컴포넌트
        const Reveal = ({ children, className = "", style = {} }) => {
            const ref = useRef(null);
            useEffect(() => {
                const observer = new IntersectionObserver(
                    ([entry]) => {
                        if (entry.isIntersecting) {
                            entry.target.classList.add('active');
                        }
                    },
                    { threshold: 0.1 }
                );
                if (ref.current) observer.observe(ref.current);
                return () => observer.disconnect();
            }, []);
            return <div ref={ref} className={`reveal ${className}`} style={style}>{children}</div>;
        };

        // 익명화된 카테고리 데이터
        const categories = [
            { id: 1, name: '???', desc: 'coming soon..' },
            { id: 2, name: '???', desc: 'coming soon..' },
            { id: 3, name: '???', desc: 'coming soon..' },
            { id: 4, name: '???', desc: 'coming soon..' },
            { id: 5, name: '???', desc: 'coming soon..' },
            { id: 6, name: '???', desc: 'coming soon..' }
        ];

        function App() {
            const [page, setPage] = useState('home');
            const [selectedProduct, setSelectedProduct] = useState(null);
            const [isMenuOpen, setIsMenuOpen] = useState(false);

            const syncPageWithHash = useCallback(() => {
                const hash = window.location.hash;
                if (!hash || hash === '#/' || hash === '#/home') {
                    setPage('home');
                    setSelectedProduct(null);
                } else if (hash === '#/products') {
                    setPage('products');
                    setSelectedProduct(null);
                } else if (hash === '#/error') {
                    setPage('error');
                    setSelectedProduct(null);
                } else if (hash.startsWith('#/detail')) {
                    const params = new URLSearchParams(hash.split('?')[1]);
                    const id = parseInt(params.get('id'));
                    const product = categories.find(c => c.id === id);
                    setPage('detail');
                    setSelectedProduct(product || null);
                } else {
                    setPage('error'); // 정의되지 않은 경로는 404로 유도
                }
                window.scrollTo(0, 0);
            }, []);

            useEffect(() => {
                syncPageWithHash();
                window.addEventListener('hashchange', syncPageWithHash);
                return () => window.removeEventListener('hashchange', syncPageWithHash);
            }, [syncPageWithHash]);

            const navigateTo = (p, data = null) => {
                let targetHash = '#/';
                if (p === 'home') targetHash = '#/home';
                else if (p === 'products') targetHash = '#/products';
                else if (p === 'error') targetHash = '#/error';
                else if (p === 'detail' && data) targetHash = `#/detail?id=${data.id}`;
                
                window.location.hash = targetHash;
                setIsMenuOpen(false);
            };

            const Navbar = () => (
                <nav className="fixed top-0 left-0 w-full z-50 bg-black/80 backdrop-blur-md border-b border-white/10 px-6 py-4 flex justify-between items-center text-white">
                    <div className="text-2xl font-semibold tracking-tighter cursor-pointer" onClick={() => navigateTo('home')}>
                        PICK
                    </div>
                    <div className="hidden md:flex items-center gap-10 text-sm font-medium uppercase tracking-widest text-white">
                        <button onClick={() => navigateTo('home')} className={`hover:text-gray-400 transition ${page === 'home' ? 'text-white' : 'text-gray-500'}`}>Home</button>
                        <button onClick={() => navigateTo('products')} className={`hover:text-gray-400 transition ${page === 'products' ? 'text-white' : 'text-gray-500'}`}>Products</button>
                        <button onClick={() => navigateTo('products')} className="bg-white text-black px-6 py-2 text-xs font-semibold hover:bg-gray-200 transition tracking-widest ml-4 border-none outline-none">BUY</button>
                    </div>
                    <div className="md:hidden cursor-pointer text-white" onClick={() => setIsMenuOpen(!isMenuOpen)}>
                        <Icon name={isMenuOpen ? "x" : "menu"} />
                    </div>
                    {isMenuOpen && (
                        <div className="fixed inset-0 top-[65px] bg-black z-40 p-10 flex flex-col gap-8 text-4xl font-semibold md:hidden">
                            <button onClick={() => navigateTo('home')}>HOME</button>
                            <button onClick={() => navigateTo('products')}>PRODUCTS</button>
                            <button onClick={() => navigateTo('products')} className="bg-white text-black py-4 text-xl text-center">BUY NOW</button>
                        </div>
                    )}
                </nav>
            );

            const HomePage = () => (
                <div className="pt-24">
                    <section className="px-6 py-20 md:py-40 max-w-7xl mx-auto flex flex-col items-center text-center">
                        <Reveal>
                            <h1 className="text-7xl md:text-[12rem] font-semibold tracking-tighter leading-none mb-10 opacity-90 select-none">
                                PICK
                            </h1>
                        </Reveal>
                        
                        <Reveal style={{ transitionDelay: '0.2s' }}>
                            <div className="max-w-2xl mt-10">
                                <p className="text-xl md:text-3xl font-light mb-4">Pick your variety,<br />stick your style.</p>
                                <p className="text-gray-500 text-sm md:text-lg mb-12">다양함을 Pick하고, 당신의 스타일을 붙이세요.</p>
                                
                                <button 
                                    onClick={() => navigateTo('products')} 
                                    className="group flex items-center gap-4 mx-auto text-sm font-semibold uppercase tracking-widest border border-white px-12 py-5 hover:bg-white hover:text-black transition-all duration-300"
                                >
                                    VIEW PRODUCTS 
                                    <ArrowRightIcon className="group-hover:translate-x-2 transition-transform duration-300" />
                                </button>
                            </div>
                        </Reveal>
                    </section>

                    <section className="px-6 py-32 border-t border-white/10 bg-[#0a0a0a]">
                        <div className="max-w-7xl mx-auto grid md:grid-cols-2 gap-20 text-left">
                            <Reveal>
                                <div className="space-y-6">
                                    <span className="text-xs font-semibold text-gray-500 uppercase tracking-widest">[ 01. Concept ]</span>
                                    <h2 className="text-3xl md:text-4xl font-semibold leading-tight">당신의 개성을 표현하는<br />가장 작은 조각, 스티커.</h2>
                                    <p className="text-gray-400">평범한 일상에 새로운 생명력을 불어넣고 자신의 취향을 공유하는 문화를 만듭니다.</p>
                                </div>
                            </Reveal>
                            <Reveal style={{ transitionDelay: '0.2s' }}>
                                <div className="space-y-6">
                                    <span className="text-xs font-semibold text-gray-500 uppercase tracking-widest">[ 02. Quality ]</span>
                                    <h2 className="text-3xl md:text-4xl font-semibold leading-tight">타협하지 않는 디테일과<br />지속 가능한 소재의 조화.</h2>
                                    <p className="text-gray-400">고해상도 프린팅과 강력한 내구성으로 소중한 물건을 안전하고 아름답게 꾸며줍니다.</p>
                                </div>
                            </Reveal>
                        </div>
                    </section>
                </div>
            );

            // 리뉴얼된 404 에러 페이지
            const Error404Page = () => (
                <div className="min-h-[80vh] flex flex-col items-center justify-center pt-32 px-6 pb-20 max-w-7xl mx-auto text-center">
                    <Reveal>
                        <div className="mb-8 opacity-10">
                            <h1 className="text-[10rem] md:text-[15rem] font-semibold leading-none tracking-tighter">404</h1>
                        </div>
                        <h1 className="text-3xl md:text-5xl font-semibold tracking-tighter uppercase mb-6 leading-tight">PAGE NOT FOUND</h1>
                        <p className="text-lg md:text-xl font-light text-gray-500 mb-12">요청하신 페이지를 찾을 수 없거나<br/>준비 중인 서비스입니다.</p>
                        <button 
                            onClick={() => navigateTo('home')}
                            className="text-sm font-semibold uppercase tracking-widest border border-white px-10 py-4 hover:bg-white hover:text-black transition-all"
                        >
                            Back to Home
                        </button>
                    </Reveal>
                </div>
            );

            // 정식 제품 리스트 페이지
            const ProductsPage = () => {
                return (
                    <div className="pt-32 px-6 pb-20 max-w-7xl mx-auto">
                        <Reveal>
                            <div className="mb-20 text-left">
                                <h2 className="text-xs font-semibold text-gray-500 uppercase tracking-[0.3em] mb-4">Categories</h2>
                                <h1 className="text-5xl md:text-7xl font-semibold tracking-tighter uppercase">OUR VARIETY</h1>
                            </div>
                        </Reveal>
                        <div className="grid md:grid-cols-2 lg:grid-cols-3 gap-6">
                            {categories.map((cat, idx) => (
                                <Reveal key={cat.id} style={{ transitionDelay: `${(idx % 3) * 0.1}s` }}>
                                    <div 
                                        onClick={() => navigateTo('detail', cat)} 
                                        className="group relative border border-white/10 bg-[#0d0d0d] h-[500px] flex flex-col justify-end hover:border-white/30 transition-all duration-500 cursor-pointer overflow-hidden"
                                    >
                                        <div className="absolute inset-0 z-0 bg-[#111] flex items-center justify-center transition-transform duration-700 group-hover:scale-105">
                                            <div className="w-64 h-64 border-2 border-gray-500/30 rotate-12 flex items-center justify-center p-8 text-center">
                                                <span className="text-xl font-semibold italic uppercase tracking-tighter text-gray-500/40">PICK STICKER<br/>{cat.name}</span>
                                            </div>
                                            <div className="absolute top-4 right-4 text-[10px] uppercase tracking-widest text-gray-500/20">Authentic PICK Label</div>
                                        </div>
                                        <div className="absolute inset-0 z-10 bg-gradient-to-t from-black via-black/40 to-transparent"></div>
                                        <div className="relative z-20 p-10 text-left">
                                            <h3 className="text-3xl font-semibold mb-4 tracking-tighter uppercase">{cat.name}</h3>
                                            <p className="text-sm opacity-60 mb-8 leading-tight">{cat.desc}</p>
                                            <div className="flex items-center gap-2 text-xs font-semibold uppercase tracking-tighter pt-4 border-t border-white/20">
                                                Explore Collection <Icon name="chevron-right" size={14} />
                                            </div>
                                        </div>
                                    </div>
                                </Reveal>
                            ))}
                        </div>
                    </div>
                );
            };

            const DetailPage = ({ product }) => {
                if (!product) return <Error404Page />;

                return (
                    <div className="pt-32 px-6 pb-40 max-w-7xl mx-auto text-left">
                        <Reveal>
                            <button onClick={() => navigateTo('products')} className="flex items-center gap-2 text-gray-500 hover:text-white mb-12 text-sm uppercase tracking-widest font-semibold">
                                <Icon name="arrow-left" size={18} /> Back to Products
                            </button>
                        </Reveal>
                        <div className="grid lg:grid-cols-2 gap-16 mb-16">
                            <Reveal>
                                <div className="aspect-square bg-[#111] border border-white/5 flex items-center justify-center relative overflow-hidden">
                                    <div className="w-64 h-64 border-4 border-white/20 rotate-12 flex items-center justify-center p-8 text-center">
                                        <span className="text-2xl font-semibold italic uppercase tracking-tighter">PICK STICKER<br/>{product.name}</span>
                                    </div>
                                    <div className="absolute top-4 right-4 text-[10px] uppercase tracking-widest opacity-30">Authentic PICK Label</div>
                                </div>
                            </Reveal>
                            <Reveal style={{ transitionDelay: '0.2s' }}>
                                <div className="flex flex-col justify-center">
                                    <span className="text-xs font-semibold text-gray-500 uppercase tracking-widest mb-4">Edition 0{product.id}</span>
                                    <h1 className="text-5xl md:text-6xl font-semibold tracking-tighter mb-6 uppercase leading-none">{product.name}</h1>
                                    <p className="text-xl text-gray-400 mb-10 leading-relaxed">{product.desc}</p>
                                    <div className="space-y-6 mb-12 uppercase text-sm">
                                        <div className="flex justify-between py-4 border-b border-white/10"><span className="text-gray-500 font-medium">Size</span><span>Mixed</span></div>
                                        <div className="flex justify-between py-4 border-b border-white/10"><span className="text-gray-500 font-medium">Material</span><span>Waterproof Matte Vinyl</span></div>
                                        <div className="flex justify-between py-4 border-b border-white/10"><span className="text-gray-500 font-medium">Price</span><span className="text-2xl font-semibold">₩18,000</span></div>
                                    </div>
                                    <button className="w-full bg-white text-black py-5 font-semibold uppercase tracking-widest hover:bg-gray-200 transition">BUY</button>
                                </div>
                            </Reveal>
                        </div>
                        <div className="mt-20">
                            <h2 className="text-xs font-semibold text-gray-500 uppercase tracking-widest mb-10 pb-4 border-b border-white/10">Detailed Views</h2>
                            <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                                {[1, 2, 3, 4, 5].map(n => (
                                    <div key={n} className={`bg-[#0d0d0d] border border-white/5 flex items-center justify-center text-gray-700 text-xs uppercase ${n === 4 ? 'aspect-[4/5] md:col-span-2' : 'aspect-square'}`}>Detail Shot 0{n}</div>
                                ))}
                            </div>
                        </div>
                    </div>
                );
            };

            return (
                <div className="min-h-screen text-white">
                    <Navbar />
                    <main>
                        {page === 'home' && <HomePage />}
                        {page === 'products' && <ProductsPage />}
                        {page === 'error' && <Error404Page />}
                        {page === 'detail' && <DetailPage product={selectedProduct} />}
                    </main>
                    <footer className="border-t border-white/10 pt-20 pb-10 px-6 text-center">
                        <Reveal>
                            <div className="text-4xl font-semibold tracking-tighter mb-6 uppercase">PICK</div>
                            <p className="text-gray-500 text-sm mb-10">다양함을 Pick하고, 당신의 스타일을 붙이세요.</p>
                            <div className="flex justify-center mb-10">
                                <a 
                                    href="https://www.instagram.com/pick_official2026/" 
                                    target="_blank" 
                                    rel="noopener noreferrer" 
                                    className="text-gray-500 hover:text-white transition"
                                    aria-label="Instagram"
                                >
                                    <InstagramIcon size={32} />
                                </a>
                            </div>
                            <div className="mt-20 pt-8 border-t border-white/5 text-[10px] text-gray-600 uppercase tracking-widest">
                                <span 
                                    onClick={() => navigateTo('error')}
                                    className="cursor-default"
                                >
                                    © 2026 PICK BRAND.
                                </span> All Rights Reserved.
                            </div>
                        </Reveal>
                    </footer>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
