<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PICK - Official Store</title>
    
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://picksticker.store">
    <meta property="og:title" content="PICK - Official Store">
    <meta property="og:description" content="가장 나다운 선택. A choice uniquely mine">
    
    <link rel="icon" href="/favicon.png" type="image/png">
    
    <!-- Vercel Insights -->
    <script src="/_vercel/insights/script.js"></script>
    
    <!-- CSS & Libraries -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            background-color: white;
            color: #1d1d1f;
            -webkit-font-smoothing: antialiased;
        }

        body { 
            font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, Roboto, sans-serif; 
            overflow-x: hidden;
            scroll-behavior: smooth;
        }
        
        .font-semibold { font-weight: 600; }
        .font-medium { font-weight: 500; }
        .font-normal { font-weight: 400; }

        .reveal { 
            opacity: 0; 
            transform: translateY(20px); 
            transition: all 0.6s cubic-bezier(0.22, 1, 0.36, 1); 
            will-change: transform, opacity;
        }
        .reveal.active { opacity: 1; transform: translateY(0); }

        .scrolly-background-section {
            height: 400vh;
            position: relative;
            z-index: 1;
        }
        .sticky-canvas-area {
            position: sticky;
            top: 0;
            left: 0;
            height: 100vh;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            background-color: white;
        }

        .popup-overlay {
            animation: appleFadeIn 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }
        @keyframes appleFadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        ::-webkit-scrollbar { width: 0px; background: transparent; }

        .scrolly-video-canvas {
            width: 100vw;
            height: 100vh;
            object-fit: cover;
            display: block;
            will-change: contents;
        }

        /* 티저 전용 페이드인 애니메이션 */
        .teaser-fade-in {
            animation: teaserFadeIn 1.2s cubic-bezier(0.16, 1, 0.3, 1);
        }
        @keyframes teaserFadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useCallback, useRef, memo } = React;

        // --- 공유 Observer (효율적인 스크롤 애니메이션) ---
        const globalObserver = typeof IntersectionObserver !== 'undefined' 
            ? new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) {
                        entry.target.classList.add('active');
                        globalObserver.unobserve(entry.target);
                    }
                });
            }, { threshold: 0.1 })
            : null;

        // --- SVG Icons ---
        const ArrowRight = memo(({ size = 16, className = "" }) => (
            <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                <line x1="5" y1="12" x2="19" y2="12"></line><polyline points="12 5 19 12 12 19"></polyline>
            </svg>
        ));

        const MenuIcon = memo(({ size = 24 }) => (
            <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                <line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="18" x2="21" y2="18"></line>
            </svg>
        ));

        const XIcon = memo(({ size = 24 }) => (
            <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                <line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line>
            </svg>
        ));

        const CheckIcon = memo(({ size = 16, className = "" }) => (
            <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" className={className}>
                <polyline points="20 6 9 17 4 12"></polyline>
            </svg>
        ));

        const InstagramIcon = memo(({ size = 24 }) => (
            <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                <rect x="2" y="2" width="20" height="20" rx="5" ry="5"></rect>
                <path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"></path>
                <line x1="17.5" y1="6.5" x2="17.51" y2="6.5"></line>
            </svg>
        ));

        // --- 수정된 상품 데이터 (빈티지, 유틸리티, 스마일, 스트릿, Y2K) ---
        const CATEGORIES = [
            { id: 1, name: '빈티지 에디션', price: '₩2,000 ~ ₩4,000', detailPrice: { phone: '₩2,000', computer: '₩4,000' }, desc: '클래식하고 감성적인 레트로 무드의 빈티지 스티커' },
            { id: 2, name: '유틸리티 에디션', price: '₩2,000 ~ ₩4,000', detailPrice: { phone: '₩2,000', computer: '₩4,000' }, desc: '테크니컬하고 실용적인 인더스트리얼 감성의 유틸리티 스티커' },
            { id: 3, name: '스마일 에디션', price: '₩2,000 ~ ₩4,000', detailPrice: { phone: '₩2,000', computer: '₩4,000' }, desc: '보기만 해도 미소가 지어지는 유쾌하고 귀여운 스마일 캐릭터 스티커' },
            { id: 4, name: '스트릿 에디션', price: '₩2,000 ~ ₩4,000', detailPrice: { phone: '₩2,000', computer: '₩4,000' }, desc: '자유분방하고 트렌디한 스트릿 문화 감성의 스트릿 스티커' },
            { id: 5, name: 'Y2K 에디션', price: '₩2,000 ~ ₩4,000', detailPrice: { phone: '₩2,000', computer: '₩4,000' }, desc: '세기말 세련된 감성과 디스토피아 미래주의를 담아낸 Y2K 스티커' }
        ];

        // --- 수정된 세트리스트 데이터 (핸드폰, 컴퓨터) ---
        const BUNDLES = [
            { 
                title: '핸드폰 스티커 (작은 사이즈)', 
                subtitle: 'Phone Sticker', 
                price: '₩2,000', 
                features: ['핸드폰, 스마트 키, 무선이어폰 케이스 등 소형 기기 최적화', '기기 후면에 부착 시 완벽한 핏을 구현하는 미니 사이즈', '우수한 고정력과 생활 방수 코팅 마감'], 
                tag: 'Small Size', 
                highlight: true 
            },
            { 
                title: '컴퓨터 스티커 (큰 사이즈)', 
                subtitle: 'Computer Sticker', 
                price: '₩4,000', 
                features: ['노트북, 데스크톱 본체, 아이패드 및 태블릿 후면용', '큼직한 존재감으로 확실한 개성을 나타내는 라지 사이즈', '자국 없이 깔끔하게 제거되는 이지 오프 특수 재질'], 
                tag: 'Large Size', 
                highlight: false 
            }
        ];

        const PURCHASE_LINK = "https://forms.gle/JJHGUTqh6HgKVvM36";

        // --- 공통 컴포넌트 ---
        const PathIndicator = memo(({ path }) => (
            <div className="text-[10px] font-medium text-gray-400 uppercase tracking-[0.4em] mb-6 select-none">
                {path}
            </div>
        ));

        const Reveal = memo(({ children, className = "" }) => {
            const ref = useRef(null);
            useEffect(() => {
                if (ref.current && globalObserver) globalObserver.observe(ref.current);
                return () => { if (ref.current && globalObserver) globalObserver.unobserve(ref.current); };
            }, []);
            return <div ref={ref} className={`reveal ${className}`}>{children}</div>;
        });

        // --- 임시 티저 페이지 컴포넌트 (우회용 백도어 탑재) ---
        const ComingSoonPage = memo(({ onBypass }) => (
            <div className="min-h-screen w-full flex flex-col items-center justify-center p-6 text-center teaser-fade-in bg-white">
                <div className="text-[12px] font-semibold tracking-[0.4em] text-gray-300 uppercase mb-8 select-none">
                    PICK BRAND
                </div>
                <h1 className="text-4xl md:text-6xl font-semibold tracking-tight leading-tight text-[#1d1d1f] select-none" style={{ letterSpacing: '-0.05em' }}>
                    5월 20일, 공개.
                </h1>
                <p className="mt-6 text-[#86868b] text-base md:text-lg font-medium tracking-tight uppercase select-none">
                    A choice uniquely <span onClick={onBypass} className="cursor-default hover:text-black transition-colors duration-300 select-all">mine</span>
                </p>
            </div>
        ));

        const Navbar = memo(({ page, navigateTo, isMenuOpen, setIsMenuOpen }) => (
            <nav className="fixed top-0 left-0 w-full z-[80] bg-white/70 backdrop-blur-md border-b border-gray-100 px-6 md:px-24 py-5 flex justify-between items-center">
                <div className="text-xl font-semibold tracking-tighter cursor-pointer select-none" onClick={() => navigateTo('#/home')}>PICK</div>
                <div className="hidden md:flex items-center gap-12 text-sm font-medium">
                    <button onClick={() => navigateTo('#/home')} className={`transition-colors ${page === 'home' ? 'text-black' : 'text-gray-400 hover:text-black'}`}>Home</button>
                    <button onClick={() => navigateTo('#/products')} className={`transition-colors ${page === 'products' ? 'text-black' : 'text-gray-400 hover:text-black'}`}>Products</button>
                    <a href={PURCHASE_LINK} target="_blank" rel="noopener noreferrer" className="bg-black text-white px-6 py-2 rounded-full text-[11px] font-semibold tracking-wider hover:bg-gray-800 transition-all">BUY</a>
                </div>
                <div className="md:hidden">
                    <button onClick={() => setIsMenuOpen(!isMenuOpen)} className="text-black p-1 relative z-[90]">
                        {isMenuOpen ? <XIcon size={24} /> : <MenuIcon size={24} />}
                    </button>
                </div>
                {isMenuOpen && (
                    <div className="fixed inset-0 z-[70] pt-[80px] bg-white/95 backdrop-blur-3xl p-8 flex flex-col h-screen">
                        <div className="flex flex-col gap-10 text-4xl font-semibold tracking-tighter">
                            <button onClick={() => navigateTo('#/home')} className={page === 'home' ? 'text-black' : 'text-gray-300'}>Home</button>
                            <button onClick={() => navigateTo('#/products')} className={page === 'products' ? 'text-black' : 'text-gray-300'}>Products</button>
                        </div>
                        <a href={PURCHASE_LINK} target="_blank" rel="noopener noreferrer" className="mt-auto w-full bg-black text-white py-5 rounded-2xl font-semibold text-lg shadow-xl active:scale-[0.98] text-center block">BUY NOW</a>
                    </div>
                )}
            </nav>
        ));

        const HomePage = memo(({ canvasRef, videoRef, navigateTo }) => (
            <div className="bg-white">
                <section className="h-screen w-full relative flex flex-col items-center overflow-hidden">
                    <div className="absolute inset-0 bg-[#f5f5f7] z-0"></div>
                    <div className="z-10 text-center pt-48 px-6 md:px-24 max-w-7xl mx-auto">
                        <Reveal>
                            <PathIndicator path="/home" />
                            <h1 className="text-4xl md:text-7xl font-semibold tracking-tight leading-tight mb-4 text-[#1d1d1f]">가장 나다운 선택.</h1>
                        </Reveal>
                        <Reveal>
                            <p className="text-[#86868b] text-base md:text-xl font-medium tracking-tight uppercase">A choice uniquely mine</p>
                        </Reveal>
                    </div>
                </section>
                
                <section id="scrolly-section" className="scrolly-background-section bg-white">
                    <div className="sticky-canvas-area">
                        <canvas ref={canvasRef} className="scrolly-video-canvas" />
                        <video 
                            ref={videoRef}
                            src="Comp 1.webm" 
                            style={{ display: 'none' }}
                            muted playsInline webkit-playsinline="true" preload="auto"
                        />
                        <div className="absolute bottom-20 left-0 w-full text-center pointer-events-none">
                            <p className="text-[10px] font-semibold text-gray-400 uppercase tracking-[0.6em] animate-pulse drop-shadow-sm">Scroll to interact</p>
                        </div>
                    </div>
                </section>

                <section className="px-6 md:px-24 py-64 max-w-7xl mx-auto space-y-64 bg-white relative z-10">
                    <div className="grid md:grid-cols-2 gap-16 md:gap-32 items-center">
                        <Reveal>
                            <div className="space-y-8 text-[#1d1d1f]">
                                <span className="text-xs font-semibold text-blue-600 uppercase tracking-[0.2em]">01 Concept</span>
                                <h2 className="text-4xl md:text-6xl font-semibold tracking-tight leading-[1.1]">가장 작은,<br/>확실한 개성.</h2>
                                <p className="text-[#86868b] text-lg leading-relaxed font-medium">우리는 일상의 소품에 새로운 생명력을 불어넣습니다. 당신의 취향을 가장 가볍고 세련되게 공유하는 방법.</p>
                            </div>
                        </Reveal>
                        {/* Concept 이미지 배치 */}
                        <div className="aspect-[4/5] bg-[#f5f5f7] rounded-[3rem] border border-gray-50 shadow-inner overflow-hidden">
                            <img 
                                src="Happy_iphone_Web.png" 
                                alt="Concept Sticker" 
                                className="w-full h-full object-cover" 
                                onError={(e) => { e.target.style.display = 'none'; }}
                            />
                        </div>
                    </div>
                    <div className="grid md:grid-cols-2 gap-16 md:gap-32 items-center">
                        {/* Quality 이미지 배치 */}
                        <div className="aspect-[4/5] bg-[#f5f5f7] rounded-[3rem] border border-gray-50 shadow-inner order-2 md:order-1 overflow-hidden">
                            <img 
                                src="Vintage_mac_Web.png" 
                                alt="Quality Sticker" 
                                className="w-full h-full object-cover" 
                                onError={(e) => { e.target.style.display = 'none'; }}
                            />
                        </div>
                        <Reveal className="order-1 md:order-2">
                            <div className="space-y-8 text-[#1d1d1f]">
                                <span className="text-xs font-semibold text-[#34c759] uppercase tracking-[0.2em]">02 Quality</span>
                                <h2 className="text-4xl md:text-6xl font-semibold tracking-tight leading-[1.1]">타협 없는<br/>피니시.</h2>
                                <p className="text-[#86868b] text-lg leading-relaxed font-medium">흔적이 남지 않는 프리미엄 소재와 고해상도 프린팅. 당신의 소중한 기기를 안전하고 아름답게 보호하며 꾸며줍니다.</p>
                            </div>
                        </Reveal>
                    </div>
                </section>

                <section className="py-64 text-center bg-[#f5f5f7] px-6 md:px-12">
                    <Reveal>
                        <h2 className="text-5xl md:text-7xl font-semibold tracking-tight mb-16 text-[#1d1d1f]">READY TO PICK?</h2>
                        <button onClick={() => navigateTo('#/products')} className="group inline-flex items-center gap-4 text-xl font-medium text-[#0066cc] hover:underline underline-offset-8 decoration-2">
                            전체 에디션 보기 <ArrowRight size={22} className="group-hover:translate-x-2 transition-transform" />
                        </button>
                    </Reveal>
                </section>
            </div>
        ));

        const ProductsPage = memo(({ navigateTo }) => (
            <div className="bg-white min-h-screen pt-40 pb-40 px-6 md:px-24 text-[#1d1d1f]">
                <div className="max-w-7xl mx-auto">
                    <Reveal><PathIndicator path="/products" /></Reveal>
                    <div className="mb-32 text-center mt-12">
                        <h1 className="text-5xl md:text-8xl font-semibold tracking-tight leading-tight">Our Variety</h1>
                        <p className="text-[#86868b] mt-8 text-lg font-medium">당신의 스타일을 완성할 5가지 독창적인 에디션</p>
                    </div>
                    <div className="grid md:grid-cols-2 lg:grid-cols-3 gap-10 mb-48">
                        {CATEGORIES.map((cat) => (
                            <Reveal key={cat.id}>
                                <div onClick={() => navigateTo(`#/products/detail/0${cat.id}`)} className="group bg-[#f5f5f7] rounded-[2.5rem] p-8 md:p-12 aspect-square flex flex-col justify-between hover:bg-[#ebebed] transition-all duration-700 cursor-pointer border border-transparent overflow-hidden">
                                    <h3 className="text-3xl font-semibold tracking-tight leading-tight">{cat.name}</h3>
                                    <div className="flex-1 flex items-center justify-center group-hover:scale-105 transition-all duration-1000">
                                        <div className="w-32 h-32 md:w-44 md:h-44 bg-white border border-gray-100 rounded-[2.5rem] rotate-12 flex items-center justify-center shadow-sm">
                                            <span className="text-gray-100 font-semibold text-2xl md:text-3xl italic tracking-tighter">PICK</span>
                                        </div>
                                    </div>
                                    <div className="flex justify-between items-center pt-8 relative text-[#86868b]">
                                        <span className="text-xs md:text-sm font-medium">자세히 보기</span>
                                        <div className="w-10 h-10 md:w-11 md:h-11 rounded-full bg-black text-white flex items-center justify-center opacity-0 group-hover:opacity-100 group-hover:scale-110 transition-all mr-1 mb-1">
                                            <ArrowRight size={18} />
                                        </div>
                                    </div>
                                </div>
                            </Reveal>
                        ))}
                    </div>
                    <div className="pt-24 border-t border-gray-100">
                        <div className="mb-24 text-center">
                            <h2 className="text-4xl md:text-6xl font-semibold tracking-tight leading-tight">Lineup & Sizes</h2>
                            <p className="text-[#86868b] mt-8 text-lg font-medium break-keep">사용 환경에 맞는 크기를 제안합니다.</p>
                        </div>
                        <div className="grid md:grid-cols-2 gap-12 max-w-5xl mx-auto">
                            {BUNDLES.map((bundle, idx) => (
                                <Reveal key={idx}>
                                    <div className={`relative h-full flex flex-col p-10 rounded-[3rem] border transition-all duration-500 ${bundle.highlight ? 'bg-[#fbfbfd] border-gray-200 shadow-xl scale-105 z-10' : 'bg-[#f5f5f7] border-transparent hover:bg-white hover:border-gray-100 hover:shadow-lg'}`}>
                                        {bundle.tag && <span className={`inline-block w-max px-3 py-1 rounded-full text-[10px] font-bold mb-6 ${bundle.highlight ? 'bg-black text-white' : 'bg-gray-200 text-gray-500'}`}>{bundle.tag}</span>}
                                        <h3 className="text-2xl font-semibold mb-2">{bundle.title}</h3>
                                        <p className="text-[#86868b] text-sm mb-6">{bundle.subtitle}</p>
                                        <div className="text-4xl font-semibold tracking-tight mb-10">{bundle.price}</div>
                                        <ul className="space-y-4 flex-1">
                                            {bundle.features.map((f, i) => (
                                                <li key={i} className="flex items-start gap-3 text-sm text-gray-500 font-medium leading-tight"><CheckIcon size={16} className="text-blue-600 mt-0.5 shrink-0" /> {f}</li>
                                            ))}
                                        </ul>
                                    </div>
                                </Reveal>
                            ))}
                        </div>
                    </div>
                </div>
            </div>
        ));

        const DetailPage = memo(({ product, navigateTo }) => (
            <div className="bg-white min-h-screen pt-40 pb-32 px-6 md:px-24 text-[#1d1d1f]">
                <div className="max-w-7xl mx-auto">
                    <Reveal><PathIndicator path={`/products/detail/0${product?.id || '?'}`} /></Reveal>
                    <button onClick={() => navigateTo('#/products')} className="flex items-center gap-2 text-[#86868b] hover:text-black mb-20 text-xs font-semibold uppercase tracking-widest transition-colors mt-8">
                        <ArrowRight size={14} className="rotate-180" /> 목록으로 돌아가기
                    </button>
                    <div className="grid lg:grid-cols-2 gap-16 md:gap-32 mb-32 items-center">
                        <div className="aspect-square bg-[#f5f5f7] rounded-[3.5rem] flex items-center justify-center relative shadow-inner overflow-hidden">
                            <div className="w-64 h-64 md:w-72 md:h-72 border-[12px] border-white rotate-12 flex items-center justify-center p-10 text-center bg-white shadow-2xl rounded-[3rem]">
                                <span className="text-2xl font-semibold italic uppercase tracking-tighter text-gray-100">PICK STICKER<br/>{product?.name}</span>
                            </div>
                        </div>
                        <div className="flex flex-col">
                            <h1 className="text-6xl md:text-8xl font-semibold tracking-tight mb-10 leading-tight">{product?.name}</h1>
                            <p className="text-xl md:text-2xl text-[#86868b] mb-16 leading-relaxed font-medium break-keep">{product?.desc}</p>
                            <div className="space-y-8 mb-20 border-t border-gray-100 pt-12 text-sm font-medium">
                                <div className="flex justify-between items-start gap-12">
                                    <span className="text-[#86868b] uppercase tracking-widest text-[12px]">Sizes & Prices</span>
                                    <div className="text-right space-y-1">
                                        <div className="text-base text-[#1d1d1f]">핸드폰 스티커 (작은 사이즈) — {product?.detailPrice?.phone}</div>
                                        <div className="text-base text-[#1d1d1f]">컴퓨터 스티커 (큰 사이즈) — {product?.detailPrice?.computer}</div>
                                    </div>
                                </div>
                                <div className="flex justify-between items-start gap-12">
                                    <span className="text-[#86868b] uppercase tracking-widest text-[12px]">Place</span>
                                    <span className="text-right break-keep text-base">서울특별시 양천구 목동로11길 46 <br/>서울영상고 영상동 2층 비전홀</span>
                                </div>
                            </div>
                            <a href={PURCHASE_LINK} target="_blank" rel="noopener noreferrer" className="bg-black text-white py-6 rounded-full font-semibold text-sm hover:bg-gray-800 transition-all shadow-xl active:scale-[0.98] text-center block">BUY NOW</a>
                        </div>
                    </div>
                </div>
            </div>
        ));

        // --- Main App ---
        function App() {
            const [isTeaser, setIsTeaser] = useState(true); // 기본값: 티저 모드 진입
            const [page, setPage] = useState('home');
            const [selectedProduct, setSelectedProduct] = useState(null);
            const [isMenuOpen, setIsMenuOpen] = useState(false);
            
            const videoRef = useRef(null);
            const canvasRef = useRef(null);
            const targetTimeRef = useRef(0);
            const lastRenderedTimeRef = useRef(-1);
            const rafIdRef = useRef(null);
            const isVideoSectionVisible = useRef(false);
            const drawRectRef = useRef({ sx: 0, sy: 0, sWidth: 0, sHeight: 0 });
            const sectionMetrics = useRef({ offsetTop: 0, scrollHeight: 0 });

            const syncPageWithHash = useCallback(() => {
                const hash = window.location.hash;
                let newPage = 'home';
                let newProduct = null;

                if (hash === '#/products') {
                    newPage = 'products';
                } else if (hash.startsWith('#/products/detail/')) {
                    const idStr = hash.split('/').pop();
                    const id = parseInt(idStr);
                    newProduct = CATEGORIES.find(c => c.id === id);
                    newPage = newProduct ? 'detail' : 'home';
                }

                setPage(newPage);
                setSelectedProduct(newProduct);
                window.scrollTo(0, 0);
            }, []);

            useEffect(() => {
                if (isTeaser) return; // 티저 상태면 비디오 스크롤 이벤트를 활성화하지 않음

                syncPageWithHash();
                window.addEventListener('hashchange', syncPageWithHash);
                
                const handleScroll = () => {
                    if (!isVideoSectionVisible.current) return;
                    const { offsetTop, scrollHeight } = sectionMetrics.current;
                    if (scrollHeight <= 0) return;

                    const scrollY = window.pageYOffset || document.documentElement.scrollTop;
                    const scrollPosInSection = scrollY - offsetTop;
                    const progress = Math.max(0, Math.min(1, scrollPosInSection / scrollHeight));
                    const video = videoRef.current;
                    
                    if (video && video.duration) {
                        targetTimeRef.current = progress * video.duration;
                    }
                };

                const performDraw = () => {
                    const video = videoRef.current;
                    const canvas = canvasRef.current;
                    if (!video || !canvas || video.readyState < 2) return;

                    const ctx = canvas.getContext('2d', { alpha: false, desynchronized: true });
                    
                    if (!video.seeking) {
                        const timeToSeek = targetTimeRef.current;
                        const diff = Math.abs(video.currentTime - timeToSeek);

                        if (diff > 0.033) { 
                            video.currentTime = timeToSeek;
                        }
                        
                        if (lastRenderedTimeRef.current !== video.currentTime) {
                            if (!ctx.imageSmoothingEnabled) {
                                ctx.imageSmoothingEnabled = true;
                                ctx.imageSmoothingQuality = 'high';
                            }
                            const { sx, sy, sWidth, sHeight } = drawRectRef.current;
                            ctx.drawImage(video, sx, sy, sWidth, sHeight, 0, 0, canvas.width, canvas.height);
                            lastRenderedTimeRef.current = video.currentTime;
                        }
                    }
                };

                const renderLoop = () => {
                    if (isVideoSectionVisible.current) {
                        performDraw();
                    }
                    rafIdRef.current = requestAnimationFrame(renderLoop);
                };

                let rvfcId;
                if (videoRef.current && 'requestVideoFrameCallback' in HTMLVideoElement.prototype) {
                    const videoCallback = () => {
                        if (isVideoSectionVisible.current) performDraw();
                        rvfcId = videoRef.current.requestVideoFrameCallback(videoCallback);
                    };
                    rvfcId = videoRef.current.requestVideoFrameCallback(videoCallback);
                }

                window.addEventListener('scroll', handleScroll, { passive: true });
                rafIdRef.current = requestAnimationFrame(renderLoop);

                return () => {
                    window.removeEventListener('hashchange', syncPageWithHash);
                    window.removeEventListener('scroll', handleScroll);
                    if (rafIdRef.current) cancelAnimationFrame(rafIdRef.current);
                    if (rvfcId && videoRef.current) videoRef.current.cancelVideoFrameCallback(rvfcId);
                };
            }, [syncPageWithHash, page, isTeaser]);

            useEffect(() => {
                if (isTeaser) return; // 티저 상태면 메트릭 분석을 생하지 않음

                const section = document.getElementById('scrolly-section');
                const video = videoRef.current;
                const canvas = canvasRef.current;

                const updateMetrics = () => {
                    if (!section || !video || !canvas) return;
                    sectionMetrics.current = {
                        offsetTop: section.offsetTop,
                        scrollHeight: section.offsetHeight - window.innerHeight
                    };
                    const dpr = Math.min(window.devicePixelRatio || 1, 2);
                    canvas.width = window.innerWidth * dpr;
                    canvas.height = window.innerHeight * dpr;

                    if (video.videoWidth) {
                        const vWidth = video.videoWidth;
                        const vHeight = video.videoHeight;
                        const cWidth = canvas.width;
                        const cHeight = canvas.height;
                        const vRatio = vWidth / vHeight;
                        const cRatio = cWidth / cHeight;
                        if (vRatio > cRatio) {
                            drawRectRef.current = { sHeight: vHeight, sWidth: vHeight * cRatio, sx: (vWidth - (vHeight * cRatio)) / 2, sy: 0 };
                        } else {
                            drawRectRef.current = { sWidth: vWidth, sHeight: vWidth / cRatio, sx: 0, sy: (vHeight - (vWidth / cRatio)) / 2 };
                        }
                    }
                    lastRenderedTimeRef.current = -1;
                };

                const sectionObserver = new IntersectionObserver(([entry]) => {
                    isVideoSectionVisible.current = entry.isIntersecting;
                    if (entry.isIntersecting) {
                        updateMetrics();
                        if (video && video.readyState < 2) video.load();
                    }
                }, { threshold: 0 });

                if (section) sectionObserver.observe(section);
                if (video) video.addEventListener('loadedmetadata', updateMetrics);
                window.addEventListener('resize', updateMetrics);
                updateMetrics();

                return () => {
                    if (section) sectionObserver.disconnect();
                    video?.removeEventListener('loadedmetadata', updateMetrics);
                    window.removeEventListener('resize', updateMetrics);
                };
            }, [page, isTeaser]);

            useEffect(() => {
                document.body.style.overflow = isMenuOpen ? 'hidden' : 'unset';
            }, [isMenuOpen]);

            const navigateTo = useCallback((target) => {
                window.location.hash = target;
                setIsMenuOpen(false);
            }, []);

            // 우회 경로(Bypass)를 호출하는 함수
            const handleTeaserBypass = useCallback(() => {
                setIsTeaser(false);
            }, []);

            // 티저 모드일 경우 티저 스크린만 반환
            if (isTeaser) {
                return <ComingSoonPage onBypass={handleTeaserBypass} />;
            }

            return (
                <div className="min-h-screen bg-white">
                    <Navbar page={page} navigateTo={navigateTo} isMenuOpen={isMenuOpen} setIsMenuOpen={setIsMenuOpen} />
                    <main>
                        {page === 'home' && <HomePage canvasRef={canvasRef} videoRef={videoRef} navigateTo={navigateTo} />}
                        {page === 'products' && <ProductsPage navigateTo={navigateTo} />}
                        {page === 'detail' && <DetailPage product={selectedProduct} navigateTo={navigateTo} />}
                    </main>
                    <footer className="bg-[#f5f5f7] pt-40 pb-20 px-6 md:px-24 text-center border-t border-gray-100 text-[#1d1d1f]">
                        <div className="text-5xl font-semibold tracking-tighter mb-10">PICK</div>
                        <p className="text-[#86868b] text-lg mb-16 font-medium">가장 나다운 선택. A choice uniquely mine</p>
                        <div className="flex justify-center mb-24">
                            <a href="https://www.instagram.com/pick_official2026/" target="_blank" rel="noopener noreferrer" className="w-16 h-16 rounded-full border border-gray-200 flex items-center justify-center text-[#86868b] hover:text-black hover:border-black transition-all bg-white shadow-sm">
                                <InstagramIcon size={24} />
                            </a>
                        </div>
                        <div className="pt-12 border-t border-gray-200/50 text-[11px] text-[#86868b] font-medium uppercase tracking-[0.5em]">© 2026 PICK BRAND. All Rights Reserved.</div>
                    </footer>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
